<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Industrial Automation - Bytenex Innovation</title>

<style>
body {
  margin: 0;
  font-family: 'Segoe UI', Arial, sans-serif;
  background: #f5f7fa;
}

/* Header */
.header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 15px 30px;
  background: #fff;
}

.brand {
  font-size: 22px;
  font-weight: bold;
  color: #00aaff;
}

/* Hero */
.hero {
  text-align: center;
  padding: 60px 20px;
  background: linear-gradient(to right, #00aaff, #0077aa);
  color: #fff;
}

/* Grid */
.grid {
  padding: 40px 20px;
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
  gap: 20px;
}

/* Card */
.card {
  position: relative;
  border-radius: 15px;
  overflow: hidden;
}

.card img {
  width: 100%;
  height: 200px;
  object-fit: cover;
}

.overlay {
  position: absolute;
  bottom: 0;
  width: 100%;
  padding: 15px;
  background: linear-gradient(to top, rgba(0,0,0,0.8), transparent);
  color: #fff;
}

.btn {
  display: inline-block;
  margin-top: 8px;
  padding: 6px 14px;
  background: #00aaff;
  color: #fff;
  border-radius: 20px;
  text-decoration: none;
  font-size: 12px;
}

/* Popup */
.popup {
  display: none;
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.7);
}

.popup-content {
  background: #fff;
  padding: 25px;
  border-radius: 10px;
  width: 90%;
  max-width: 700px;
  margin: 60px auto;
  position: relative;
  max-height: 80vh;
  overflow-y: auto;
  line-height: 1.7;
}

.close {
  position: absolute;
  right: 15px;
  top: 10px;
  font-size: 22px;
  cursor: pointer;
}

/* Footer */
.footer {
  text-align: center;
  padding: 15px;
  background: #000;
  color: #aaa;
}
</style>
</head>

<body>

<!-- Header -->
<div class="header">
  <div style="display:flex; align-items:center;">
    <img src="DOC-20260410-WA0001.jpg" style="height:40px; margin-right:10px;">
    <div class="brand">Bytenex Innovation</div>
  </div>
</div>

<!-- Hero -->
<div class="hero">
  <h1>Industrial Automation</h1>
  <p>Smart Control Panels & Automation Solutions</p>
</div>

<!-- Cards -->
<div class="grid">

<div class="card">
<img src="plc.png">
<div class="overlay">
<h3>PLC Panels</h3>
<a href="#" class="btn" onclick="openPopup('plc')">View More</a>
</div>
</div>

<div class="card">
<img src="mcc.png">
<div class="overlay">
<h3>MCC Panels</h3>
<a href="#" class="btn" onclick="openPopup('mcc')">View More</a>
</div>
</div>

<div class="card">
<img src="pcc.png">
<div class="overlay">
<h3>PCC Panels</h3>
<a href="#" class="btn" onclick="openPopup('pcc')">View More</a>
</div>
</div>

<div class="card">
<img src="scada.png">
<div class="overlay">
<h3>SCADA Systems</h3>
<a href="#" class="btn" onclick="openPopup('scada')">View More</a>
</div>
</div>

<div class="card">
<img src="vfd.png">
<div class="overlay">
<h3>VFD Panels</h3>
<a href="#" class="btn" onclick="openPopup('vfd')">View More</a>
</div>
</div>

<div class="card">
<img src="custom.png">
<div class="overlay">
<h3>Custom Panels</h3>
<a href="#" class="btn" onclick="openPopup('custom')">View More</a>
</div>
</div>

</div>

<!-- Popup -->
<div id="popup" class="popup">
  <div class="popup-content">
    <span class="close" onclick="closePopup()">&times;</span>
    <h2 id="popup-title"></h2>
    <p id="popup-text"></p>
  </div>
</div>

<!-- Footer -->
<div class="footer">
  © 2026 Bytenex Innovation. All Rights Reserved.
</div>

<!-- FULL DETAILED SCRIPT -->
<script>
function openPopup(type) {
  const t = document.getElementById("popup-title");
  const p = document.getElementById("popup-text");

  if(type==='plc'){
    t.innerHTML="PLC Panels – Smart Automation Core";
    p.innerHTML=`Our PLC Panels are engineered for high-performance industrial automation, ensuring precision, flexibility, and reliability.

<br><br><b>Design & Engineering:</b><br>
• Structured panel layout with proper cable management<br>
• Integration with HMI for real-time control<br>
• Modular and expandable architecture<br>

<br><b>Key Features:</b><br>
• High-speed PLC processing<br>
• IIoT-ready integration<br>
• Real-time diagnostics<br>
• Expandable I/O modules<br>

<br><b>Applications:</b><br>
Manufacturing, process plants, automation systems.`;
  }

  if(type==='mcc'){
    t.innerHTML="MCC Panels – Reliable Motor Control";
    p.innerHTML=`MCC Panels provide centralized motor control with safety and efficiency.

<br><br><b>Design:</b><br>
• Multi-compartment panel design<br>
• Industrial-grade enclosure<br>

<br><b>Features:</b><br>
• Overload protection<br>
• Short circuit safety<br>
• Modular scalability<br>

<br><b>Applications:</b><br>
HVAC, pumps, conveyors.`;
  }

  if(type==='pcc'){
    t.innerHTML="PCC Panels – Power Distribution";
    p.innerHTML=`PCC Panels ensure safe electrical distribution.

<br><br><b>Design:</b><br>
• ACB/MCCB protection<br>
• Busbar system<br>

<br><b>Features:</b><br>
• High load capacity<br>
• Monitoring systems<br>

<br><b>Applications:</b><br>
Industrial plants, buildings.`;
  }

  if(type==='scada'){
    t.innerHTML="SCADA Systems";
    p.innerHTML=`SCADA provides real-time monitoring.

<br><br><b>Features:</b><br>
• Data visualization<br>
• Alarm systems<br>
• Remote access

<br><br><b>Applications:</b><br>
Automation & smart systems.`;
  }

  if(type==='vfd'){
    t.innerHTML="VFD Panels";
    p.innerHTML=`VFD Panels control motor speed efficiently.

<br><br><b>Features:</b><br>
• Energy saving<br>
• Soft start/stop<br>
• Speed control

<br><br><b>Applications:</b><br>
Pumps, fans, conveyors.`;
  }

  if(type==='custom'){
    t.innerHTML="Custom Panels";
    p.innerHTML=`Custom-built panels designed as per requirements.

<br><br><b>Features:</b><br>
• Flexible design<br>
• Multi-system integration<br>

<br><b>Applications:</b><br>
Custom industrial projects.`;
  }

  document.getElementById("popup").style.display="block";
}

function closePopup(){
  document.getElementById("popup").style.display="none";
}
</script>

</body>
</html>
