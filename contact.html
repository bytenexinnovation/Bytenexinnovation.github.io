<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Contact - Bytenex Innovation</title>

<style>
body {
  margin: 0;
  font-family: 'Segoe UI', Arial, sans-serif;
  background: #f5f5f5;
  color: #333;
}

/* Header */
.header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 12px 20px;
  background: #fff;
  border-bottom: 1px solid #ddd;
}

.left {
  display: flex;
  align-items: center;
}

.logo-box {
  width: 40px;
  height: 40px;
  border-radius: 50%;
  overflow: hidden;
}

.logo {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

.brand {
  margin-left: 10px;
  font-size: 20px;
  font-weight: bold;
  color: #00aaff;
}

.nav-btn {
  text-decoration: none;
  padding: 8px 18px;
  background: #00aaff;
  color: #fff;
  border-radius: 20px;
  font-size: 14px;
  margin-left: 10px;
}

.container {
  padding: 30px 20px;
}

h1 {
  color: #0077aa;
}

.card {
  display: flex;
  align-items: center;
  background: #fff;
  padding: 20px;
  margin-bottom: 20px;
  border-radius: 10px;
}

.icon {
  font-size: 40px;
  margin-right: 20px;
}

.title {
  font-size: 20px;
  color: #0077aa;
  font-weight: bold;
}

.desc a {
  color: #0077aa;
  text-decoration: none;
}

.footer {
  text-align: center;
  padding: 20px;
  background: #000;
  color: #888;
}

/* Chatbot */
#chatBtn {
  position: fixed;
  bottom: 20px;
  right: 20px;
  background: #00aaff;
  color: #fff;
  padding: 14px;
  border-radius: 50%;
  cursor: pointer;
  font-size: 20px;
}

#chatBox {
  position: fixed;
  bottom: 80px;
  right: 20px;
  width: 320px;
  height: 420px;
  background: #fff;
  border-radius: 10px;
  display: none;
  flex-direction: column;
  box-shadow: 0 5px 20px rgba(0,0,0,0.2);
}

#chatHeader {
  background: #00aaff;
  color: #fff;
  padding: 10px;
}

#chatMessages {
  flex: 1;
  padding: 10px;
  overflow-y: auto;
}

#userInput {
  border: none;
  border-top: 1px solid #ddd;
  padding: 10px;
  width: 100%;
}
</style>
</head>

<body>

<div class="header">
  <div class="left">
    <div class="logo-box">
      <img src="DOC-20260410-WA0001.jpg" class="logo">
    </div>
    <div class="brand">Bytenex Innovation</div>
  </div>

  <div>
    <a href="#" class="nav-btn">Home</a>
    <a href="#" class="nav-btn">Contact</a>
  </div>
</div>

<div class="container">
  <h1>Contact Us</h1>

  <div class="card">
    <div class="icon">📧</div>
    <div>
      <div class="title">Sales</div>
      <div class="desc">info@bytenexinnovation.in</div>
    </div>
  </div>

  <div class="card">
    <div class="icon">📞</div>
    <div>
      <div class="title">Call Us</div>
      <div class="desc">+91 82000 31345</div>
    </div>
  </div>
</div>

<div id="chatBtn" onclick="toggleChat()">💬</div>

<div id="chatBox">
  <div id="chatHeader">AI Assistant</div>
  <div id="chatMessages"></div>
  <input type="text" id="userInput" placeholder="Ask something..." onkeypress="handleKey(event)">
</div>

<div class="footer">© 2026 Bytenex Innovation</div>

<script>
function toggleChat() {
  let box = document.getElementById("chatBox");
  box.style.display = box.style.display === "flex" ? "none" : "flex";
}

function handleKey(e) {
  if (e.key === "Enter") {
    let input = document.getElementById("userInput");
    let msg = input.value.toLowerCase();

    let chat = document.getElementById("chatMessages");
    chat.innerHTML += "<div><b>You:</b> " + msg + "</div>";

    let reply = "";

    if (msg.includes("price") || msg.includes("product")) {
      reply = "Please contact sales: info@bytenexinnovation.in";
    } else if (msg.includes("support")) {
      reply = "Contact support: engineers@bytenexinnovation.in";
    } else if (msg.includes("call")) {
      reply = "Call us at +91 82000 31345";
    } else {
      reply = "Hello! How can I help you?";
    }

    chat.innerHTML += "<div><b>AI:</b> " + reply + "</div>";

    input.value = "";
    chat.scrollTop = chat.scrollHeight;
  }
}
</script>

</body>
</html>
