<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Contact - Bytenex Innovation</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f5f5f5;
      color: #333;
    }

    /* Header */
    .header {
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
      background: #fff;
      font-size: 28px;
      font-weight: bold;
      color: #00aaff;
      border-bottom: 1px solid #ddd;
    }

    /* Section */
    .container {
      padding: 30px 20px;
    }

    h1 {
      font-size: 28px;
      margin-bottom: 30px;
    }

    /* Card */
    .card {
      display: flex;
      align-items: center;
      background: #fff;
      padding: 20px;
      margin-bottom: 20px;
      border-radius: 10px;
      transition: 0.3s;
      text-decoration: none;
      color: #333;
    }

    .card:hover {
      transform: translateY(-3px);
      box-shadow: 0 5px 15px rgba(0,0,0,0.1);
    }

    /* Icon */
    .icon {
      font-size: 50px;
      margin-right: 20px;
    }

    .title {
      font-size: 20px;
      color: #0077aa;
      font-weight: bold;
    }

    .desc {
      color: #555;
      margin-top: 5px;
    }

  </style>
</head>

<body>

<!-- Header -->
<div class="header">
  Bytenex Innovation
</div>

<!-- Content -->
<div class="container">

  <h1>Contact Us</h1>

  <!-- Sales -->
  <a href="mailto:info@bytenexinnovation.in?subject=Sales Enquiry&body=Hello Bytenex Team," class="card">
    <div class="icon">📧</div>
    <div>
      <div class="title">Sales</div>
      <div class="desc">Get in touch with one of our sales representatives.</div>
    </div>
  </a>

  <!-- Support -->
  <a href="mailto:engineers@bytenexinnovation.in?subject=Support Request&body=Hello Bytenex Team," class="card">
    <div class="icon">🎧</div>
    <div>
      <div class="title">Help and Support</div>
      <div class="desc">For product support, careers and company questions.</div>
    </div>
  </a>

</div>

</body>
</html>
