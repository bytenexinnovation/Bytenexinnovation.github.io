<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Home - Bytenex Innovation</title>

<style>
body {
  margin: 0;
  font-family: 'Segoe UI', Arial, sans-serif;
  background: #f5f5f5;
  color: #333;
}

/* Header */
.header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 12px 20px;
  background: #fff;
  border-bottom: 1px solid #ddd;
}

.left { display: flex; align-items: center; }

.logo-box {
  width: 40px;
  height: 40px;
  border-radius: 50%;
  overflow: hidden;
}

.logo { width: 100%; height: 100%; object-fit: cover; }

.brand {
  margin-left: 10px;
  font-size: 20px;
  font-weight: bold;
  color: #00aaff;
}

.nav-btn {
  text-decoration: none;
  padding: 8px 18px;
  background: #00aaff;
  color: #fff;
  border-radius: 20px;
  font-size: 14px;
  margin-left: 10px;
}

/* Content */
.container {
  padding: 40px 20px;
  text-align: center;
}

h1 {
  color: #0077aa;
}

/* Footer */
.footer {
  text-align: center;
  padding: 20px;
  background: #000;
  color: #888;
  margin-top: 40px;
}

/* Chatbot */
#chatBtn {
  position: fixed;
  bottom: 20px;
  right: 20px;
  background: #00aaff;
  color: #fff;
  padding: 14px;
  border-radius: 50%;
  cursor: pointer;
}

#chatBox {
  position: fixed;
  bottom: 80px;
  right: 20px;
  width: 320px;
  height: 420px;
  background: #fff;
  border-radius: 10px;
  display: none;
  flex-direction: column;
  box-shadow: 0 5px 20px rgba(0,0,0,0.2);
}

#chatHeader {
  background: #00aaff;
  color: #fff;
  padding: 10px;
}

#chatMessages {
  flex: 1;
  padding: 10px;
  overflow-y: auto;
  font-size: 14px;
}

#userInput {
  border: none;
  border-top: 1px solid #ddd;
  padding: 10px;
  width: 100%;
}
</style>
</head>

<body>

<!-- Header -->
<div class="header">
  <div class="left">
    <div class="logo-box">
      <img src="DOC-20260410-WA0001.jpg" class="logo">
    </div>
    <div class="brand">Bytenex Innovation</div>
  </div>

  <div>
    <a href="index.html" class="nav-btn">Home</a>
    <a href="about.html" class="nav-btn">About</a>
    <a href="product.html" class="nav-btn">Products</a>
    <a href="manufacturer.html" class="nav-btn">Manufacturing</a>
    <a href="contact.html" class="nav-btn">Contact</a>
  </div>
</div>

<!-- Main Content -->
<div class="container">
  <h1>Welcome to Bytenex Innovation</h1>
  <p>Your trusted partner for Networking, CCTV & IT Solutions.</p>
</div>

<!-- Visitor Counter -->
<div style="text-align:center; margin-top:20px;">

  <div style="font-size:16px; color:#555;">
    👁️ Total Visitors:
    <img src="https://hitwebcounter.com/counter/counter.php?page=12345678&style=0006&nbdigits=6&type=page&initCount=0" />
  </div>

  <div style="font-size:16px; color:#555; margin-top:10px;">
    🔴 Live Visitors:
    <span id="liveCount">1</span>
  </div>

</div>

<!-- Chatbot -->
<div id="chatBtn" onclick="toggleChat()">💬</div>

<div id="chatBox">
  <div id="chatHeader">Bytenex AI Assistant</div>
  <div id="chatMessages"></div>
  <input type="text" id="userInput" placeholder="Ask something..." onkeypress="handleKey(event)">
</div>

<!-- Footer -->
<div class="footer">
  © 2026 Bytenex Innovation. All Rights Reserved.
</div>

<script>
// Chat toggle
function toggleChat() {
  let box = document.getElementById("chatBox");
  box.style.display = box.style.display === "flex" ? "none" : "flex";
}

// Chat logic
function handleKey(e) {
  if (e.key === "Enter") {
    let input = document.getElementById("userInput");
    let msg = input.value.toLowerCase().trim();

    let chat = document.getElementById("chatMessages");
    chat.innerHTML += "<div><b>You:</b> " + msg + "</div>";

    let reply = "";
    let found = true;

    if (msg.includes("hi") || msg.includes("hello")) {
      reply = "Hello! Welcome to Bytenex Innovation 😊";
    }
    else if (msg.includes("price")) {
      reply = "Redirecting to sales...";
      window.location.href = "mailto:info@bytenexinnovation.in";
    }
    else if (msg.includes("support")) {
      reply = "Redirecting to support...";
      window.location.href = "mailto:engineers@bytenexinnovation.in";
    }
    else if (msg.includes("call")) {
      reply = "Call us at +91 82000 31345";
    }
    else {
      found = false;
    }

    if (!found) {
      reply = "This support is diverted to engineers.";
      window.location.href = "mailto:engineers@bytenexinnovation.in?body=" + encodeURIComponent(msg);
    }

    chat.innerHTML += "<div><b>AI:</b> " + reply + "</div>";

    input.value = "";
    chat.scrollTop = chat.scrollHeight;
  }
}

// Fake live visitors
function updateLiveVisitors() {
  let count = Math.floor(Math.random() * 5) + 1;
  document.getElementById("liveCount").innerText = count;
}
setInterval(updateLiveVisitors, 5000);
updateLiveVisitors();
</script>

</body>
</html>
