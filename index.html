<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Bytenex Innovation</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background-color: #0b0f1a;
      color: #fff;
    }

    /* Navbar */
    .navbar {
      position: sticky;
      top: 0;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 15px 40px;
      background: rgba(0, 0, 0, 0.6);
      backdrop-filter: blur(10px);
      border-bottom: 1px solid rgba(0, 255, 255, 0.2);
      z-index: 1000;
    }

    .nav-left {
      display: flex;
      align-items: center;
      animation: slideDown 1s ease;
    }

    .logo {
      height: 45px;
      border-radius: 10px;
      mix-blend-mode: screen;
      opacity: 0.9;
      filter: brightness(1.2) contrast(1.1);
      box-shadow: 0 0 20px rgba(0,234,255,0.4);
      animation: glowPulse 2s infinite alternate;
      transition: 0.3s;
    }

    .logo:hover {
      transform: scale(1.1);
      opacity: 1;
    }

    .brand-name {
      margin-left: 10px;
      font-size: 20px;
      font-weight: bold;
      color: #00eaff;
    }

    .nav-links a {
      color: #00eaff;
      margin-left: 20px;
      text-decoration: none;
      font-size: 18px;
      transition: 0.3s;
    }

    .nav-links a:hover {
      color: #fff;
      text-shadow: 0 0 10px #00eaff;
    }

    /* Hero */
    .hero {
      background: linear-gradient(135deg, #0b0f1a, #001f3f);
      padding: 120px 20px;
      text-align: center;
    }

    .welcome-text {
      font-size: 22px;
      color: #ccc;
      margin-bottom: 10px;
      animation: fadeIn 2s ease-in-out;
    }

    .typing {
      font-size: 45px;
      color: #00eaff;
      text-shadow: 0 0 20px #00eaff;
      overflow: hidden;
      white-space: nowrap;
      border-right: 3px solid #00eaff;
      width: 0;
      animation: typing 3s steps(20, end) forwards, blink 0.8s infinite;
    }

    .hero p {
      font-size: 20px;
      color: #ccc;
      margin: 15px 0;
      animation: fadeIn 3s ease-in-out;
    }

    .hero a {
      display: inline-block;
      margin-top: 20px;
      padding: 12px 30px;
      background: #00eaff;
      color: #000;
      text-decoration: none;
      border-radius: 25px;
      font-weight: bold;
      transition: 0.3s;
    }

    .hero a:hover {
      background: #00bcd4;
      box-shadow: 0 0 15px #00eaff;
    }

    /* Animations */
    @keyframes glowPulse {
      from { box-shadow: 0 0 10px #00eaff; }
      to { box-shadow: 0 0 30px #00eaff; }
    }

    @keyframes slideDown {
      from { transform: translateY(-50px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }

    @keyframes typing {
      from { width: 0 }
      to { width: 100% }
    }

    @keyframes blink {
      50% { border-color: transparent }
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* Services */
    .services {
      padding: 60px 20px;
      text-align: center;
    }

    .services h2 {
      color: #00eaff;
      margin-bottom: 20px;
    }

    .service-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 20px;
      margin-top: 40px;
    }

    .service-card {
      background: #111827;
      padding: 25px;
      border-radius: 10px;
      border: 1px solid rgba(0,255,255,0.1);
      transition: 0.3s;
    }

    .service-card:hover {
      transform: translateY(-5px);
      box-shadow: 0 0 15px rgba(0,255,255,0.3);
    }

    /* Why */
    .why {
      padding: 60px 20px;
      background: #0f172a;
      text-align: center;
    }

    .why h2 {
      color: #00eaff;
      margin-bottom: 25px;
    }

    .why p {
      max-width: 800px;
      margin: auto;
      color: #bbb;
      line-height: 1.8;
    }

    /* Contact */
    .contact {
      text-align: center;
      padding: 60px;
    }

    .contact h2 {
      color: #00eaff;
    }

    .contact a {
      display: inline-block;
      margin-top: 20px;
      padding: 12px 30px;
      background: #00eaff;
      color: #000;
      text-decoration: none;
      border-radius: 25px;
    }

    /* Footer */
    .footer {
      text-align: center;
      padding: 20px;
      background: #000;
      color: #888;
      font-size: 14px;
    }
  </style>
</head>

<body>

  <!-- Navbar -->
  <div class="navbar">
    <div class="nav-left">
      <img src="DOC-20260410-WA0001.jpg" class="logo">
      <span class="brand-name">Bytenex</span>
    </div>

    <div class="nav-links">
      <a href="index.html">Home</a>
      <a href="about.html">About</a>
      <a href="product.html">Products</a>
      <a href="#contact">Contact</a>
    </div>
  </div>

  <!-- Hero -->
  <div class="hero">
    <h2 class="welcome-text">Welcome to</h2>
    <h1 class="typing">Bytenex Innovation</h1>
    <p>Delivering Advanced ELV & Automation Solutions Across Industries</p>
    <a href="about.html">Explore More</a>
  </div>

  <!-- Contact -->
  <div id="contact" class="contact">
    <h2>Contact Us</h2>
    <p>+91-8200031345 | info@bytenexinnovation.in</p>
    <a href="tel:+918200031345">Call Now</a>
  </div>

  <div class="footer">
    © 2026 Bytenex Innovation. All Rights Reserved.
  </div>

</body>
</html>
