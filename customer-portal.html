<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Bytenex Customer Portal</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>
body{
  margin:0;
  font-family:'Segoe UI',sans-serif;
  background:#f4f8fb;
}

body::before{
  content:"\f085 \f1eb \f0ad \f233 \f108 \f7c0 \f0e8";
  font-family:"Font Awesome 6 Free";
  font-weight:900;
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  font-size:140px;
  color:rgba(0,0,0,0.03);
  display:flex;
  flex-wrap:wrap;
  justify-content:space-around;
  align-items:center;
  pointer-events:none;
}

.header{
  text-align:center;
  padding:20px;
  font-size:26px;
  font-weight:bold;
  color:#0d6efd;
}

.slogan{
  text-align:center;
  color:#555;
  font-size:14px;
  margin-top:-10px;
}

.container{
  width:400px;
  max-width:90%;
  margin:30px auto;
  background:white;
  padding:25px;
  border-radius:15px;
  box-shadow:0 5px 20px rgba(0,0,0,0.1);
}

input,select,textarea{
  width:100%;
  padding:12px;
  margin:10px 0;
  border-radius:8px;
  border:1px solid #ccc;
  box-sizing:border-box;
}

button{
  width:100%;
  padding:12px;
  background:#0d6efd;
  color:white;
  border:none;
  border-radius:8px;
  cursor:pointer;
}

.dashboard{
  display:none;
  padding:20px;
}

.card{
  background:white;
  padding:12px;
  border-radius:10px;
  margin-bottom:10px;
  box-shadow:0 3px 10px rgba(0,0,0,0.08);
}

.ticket{
  background:white;
  padding:12px;
  margin:10px 0;
  border-radius:10px;
  box-shadow:0 3px 10px rgba(0,0,0,0.08);
}

.topbar{
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.logout{
  background:#dc3545;
  border:none;
  padding:6px 12px;
  color:white;
  border-radius:6px;
}
</style>
</head>

<body>

<div class="header">Bytenex Customer Portal</div>
<div class="slogan">Empowering Smart Infrastructure & Seamless Support</div>

<!-- LOGIN -->
<div class="container" id="loginPage">
<h3>Login</h3>

<input id="loginId" placeholder="User ID / Email">
<input id="loginPass" type="password" placeholder="Password">

<button onclick="login()">Login</button>
</div>

<!-- CREATE -->
<div class="container" id="createPage" style="display:none">
<h3>Create Account</h3>

<input id="name" placeholder="Name">
<input id="phone" placeholder="Phone">
<input id="org" placeholder="Organisation">
<input id="location" placeholder="Location">
<input id="email" placeholder="Email">
<input id="pass" type="password" placeholder="Password">
<input id="cpass" type="password" placeholder="Confirm Password">

<button onclick="createAccount()">Create Account</button>
</div>

<!-- DASHBOARD -->
<div class="dashboard" id="dashboard">

<div class="topbar">
<h2>Dashboard</h2>
<button class="logout" onclick="logout()">Logout</button>
</div>

<div id="customerDetails"></div>

<h3>Tickets</h3>
<div id="ticketList"></div>

<!-- TICKET FORM -->
<div id="ticketForm">

<h3>New Service Request</h3>

<input id="reqName" placeholder="Requester Name">
<input id="pono" placeholder="PO No">
<input id="issueLoc" placeholder="Location">
<textarea id="desc" placeholder="Minimum 2 lines description"></textarea>

<button onclick="submitTicket()">Submit</button>

</div>

</div>

<footer style="text-align:center;color:#555;margin-top:20px;">
© Bytenex Innovation
</footer>

<script>

let currentUser=null;
let role="customer";

/* LOGIN */
function login(){

let id=loginId.value;
let pass=loginPass.value;

let users=JSON.parse(localStorage.getItem("users")||"[]");

localStorage.removeItem("currentUserData");

/* ADMIN */
if(id==="info@bytenexinnovation.in" && pass==="Asktoyash@1997"){
  role="admin";
  currentUser="admin";
  localStorage.setItem("currentUserData",JSON.stringify({
    name:"Info Admin",
    org:"Bytenex Innovation",
    location:"Head Office"
  }));
}

/* ENGINEER */
else if(id==="engineers@bytenexinnovation.in" && pass==="ByteAdmin@123"){
  role="admin";
  currentUser="engineer";
  localStorage.setItem("currentUserData",JSON.stringify({
    name:"Engineer Team",
    org:"Bytenex Engineering",
    location:"Service Division"
  }));
}

/* CUSTOMER */
else{
  let u=users.find(x=>x.userid===id && x.pass===pass);
  if(!u){alert("Invalid login");return;}
  currentUser=u.userid;
  role="customer";
  localStorage.setItem("currentUserData",JSON.stringify(u));
}

loginPage.style.display="none";
dashboard.style.display="block";

loadCustomerDetails();
loadTickets();
}

/* CREATE ACCOUNT FIXED */
function createAccount(){

let n=name.value.trim();
let p=phone.value.trim();
let o=org.value.trim();
let l=location.value.trim();
let e=email.value.trim();
let pw=pass.value;
let cp=cpass.value;

if(!n||!p||!o||!l||!e||!pw||!cp){
  alert("All fields required");return;
}

if(pw!==cp){
  alert("Password mismatch");return;
}

let uid="BYTIN01A-"+Math.floor(Math.random()*9999)+"Z"+Math.floor(Math.random()*99999);

let users=JSON.parse(localStorage.getItem("users")||"[]");

users.push({name:n,phone:p,org:o,location:l,email:e,pass:pw,userid:uid});

localStorage.setItem("users",JSON.stringify(users));

alert("Account Created!\nUser ID: "+uid);

createPage.style.display="none";
loginPage.style.display="block";
}

/* CUSTOMER DETAILS */
function loadCustomerDetails(){

let u=JSON.parse(localStorage.getItem("currentUserData"));
if(!u) return;

customerDetails.innerHTML=`
<div class="card">
<b>Welcome, ${u.name}</b><br>
${u.org}<br>
${u.location}
</div>`;
}

/* SUBMIT TICKET + MAIL */
function submitTicket(){

let d=desc.value.trim();

if(d.split(/\n+/).length<2){
  alert("Minimum 2 lines required");
  return;
}

let po=pono.value;
let req=reqName.value;
let loc=issueLoc.value;

let tickets=JSON.parse(localStorage.getItem("tickets")||"[]");

let ticketNo="BYT/"+po+"/"+Math.floor(Math.random()*900000000);

tickets.push({
  user:currentUser,
  ticket:ticketNo,
  name:req,
  pono:po,
  location:loc,
  status:"Open",
  desc:d
});

localStorage.setItem("tickets",JSON.stringify(tickets));

alert("Ticket Created: "+ticketNo);

/* MAIL (MANUAL OPEN) */
let subject="New Service Request - "+po;
let body=`Ticket: ${ticketNo}\nName: ${req}\nPO: ${po}\nLocation: ${loc}\n\n${d}`;

window.location.href=`mailto:info@bytenexinnovation.in,engineers@bytenexinnovation.in?subject=${encodeURIComponent(subject)}&body=${encodeURIComponent(body)}`;

loadTickets();
}

/* LOAD TICKETS */
function loadTickets(){

let tickets=JSON.parse(localStorage.getItem("tickets")||"[]");

ticketList.innerHTML="";

tickets.forEach(t=>{

if(role==="admin" || t.user===currentUser){

ticketList.innerHTML+=`
<div class="ticket">
<b>${t.ticket}</b><br>
${t.name}<br>
${t.pono}<br>
${t.status}<br>
${t.desc}
</div>`;
}
});
}

/* LOGOUT FIXED */
function logout(){
localStorage.removeItem("currentUserData");
currentUser=null;
role="customer";
location.reload();
}

</script>

</body>
</html>
