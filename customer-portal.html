<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Bytenex Customer Portal</title>

<style>
body {
  font-family: 'Segoe UI', Arial;
  background: linear-gradient(135deg, #0b0f1a, #111827);
  color: white;
  text-align: center;
  padding: 20px;
}

.container {
  max-width: 650px;
  margin: auto;
  background: #1f2937;
  padding: 25px;
  border-radius: 12px;
  margin-bottom: 15px;
}

input, select, textarea {
  width: 100%;
  padding: 12px;
  margin: 8px 0;
  border-radius: 8px;
  border: none;
  background: #111827;
  color: white;
}

button {
  padding: 12px;
  width: 100%;
  background: #00eaff;
  border: none;
  border-radius: 25px;
  cursor: pointer;
}

.link {
  color: #00eaff;
  cursor: pointer;
  margin: 5px;
  display: inline-block;
}

.footer {
  margin-top: 20px;
  font-size: 12px;
  color: #aaa;
}
</style>

<script>

/* ========== USER ID GENERATOR ========== */
function generateUserId() {
  let num = Math.floor(Math.random() * 1999999) + 1;
  return "BNTINV" + num + "A";
}

/* ========== REGISTER ========== */
function register() {

  let userId = generateUserId();

  let user = {
    userId: userId,
    name: r_name.value,
    email: r_email.value,
    mobile: r_mobile.value,
    company: r_company.value,
    password: r_pass.value,
    role: "customer"
  };

  localStorage.setItem(userId, JSON.stringify(user));

  alert("Account Created!\nYour USER ID:\n" + userId + "\nSave it for login");

  showLogin();
}

/* ========== LOGIN (USER ID + ADMIN EMAIL) ========== */
function login() {

  let input = user_email.value;
  let pass = user_pass.value;

  /* ADMIN LOGIN */
  if(input === "info@bytenexinnovation.in") {

    localStorage.setItem("currentUser", JSON.stringify({
      email: input,
      role: "admin"
    }));

    login_box.style.display = "none";
    register_box.style.display = "none";
    portal.style.display = "block";

    loadDashboard();
    return;
  }

  /* CUSTOMER LOGIN */
  let user = JSON.parse(localStorage.getItem(input));

  if(user && user.password === pass) {

    localStorage.setItem("currentUser", JSON.stringify(user));

    login_box.style.display = "none";
    register_box.style.display = "none";
    portal.style.display = "block";

    c_name.value = user.name;
    c_company.value = user.company;
    c_mobile.value = user.mobile;
    c_email.value = user.email;

    loadDashboard();

  } else {
    alert("Invalid USER ID or Password");
  }
}

/* ========== LOGOUT ========== */
function logout() {
  localStorage.removeItem("currentUser");
  portal.style.display = "none";
  login_box.style.display = "block";
}

/* ========== FORGOT PASSWORD ========== */
function forgotPassword() {

  let id = prompt("Enter your USER ID:");
  let user = JSON.parse(localStorage.getItem(id));

  if(!user) {
    alert("User not found");
    return;
  }

  let newPass = prompt("Enter new password:");
  if(!newPass) return;

  user.password = newPass;
  localStorage.setItem(id, JSON.stringify(user));

  alert("Password updated successfully");
}

/* ========== SWITCH ========== */
function showRegister(){
  login_box.style.display="none";
  register_box.style.display="block";
}

function showLogin(){
  register_box.style.display="none";
  login_box.style.display="block";
}

/* ========== SERVICE TOGGLE ========== */
function toggleOtherField() {
  other_box.style.display = (service.value === "Other") ? "block" : "none";
}

/* ========== DASHBOARD ========== */
function loadDashboard() {

  let tickets = JSON.parse(localStorage.getItem("tickets") || "[]");

  total_count.innerText = tickets.length;
  open_count.innerText = tickets.filter(t => t.status === "Open").length;
  close_count.innerText = tickets.filter(t => t.status === "Closed").length;

  let html = "";

  tickets.forEach((t) => {

    html += `
      <div style="background:#111827; padding:12px; margin:10px 0; border-radius:10px; text-align:left;">

        <b>${t.id}</b><br>
        ${t.service} | ${t.priority}<br>

        Status:
        <b style="color:${t.status==='Open'?'#00eaff':'#22c55e'}">${t.status}</b><br>

        ${t.status === "Closed" ? `
          <hr>
          <b>Root Cause:</b> ${t.rootCause}<br>
          <b>Closing Remark:</b> ${t.closingRemark}<br>
          <small>Closed At: ${t.closedAt}</small>
        ` : ""}

      </div>
    `;
  });

  ticket_list.innerHTML = html;
}

/* ========== GENERATE TICKET + MAIL REDIRECT ========== */
function generateTicket() {

  let type = type_sel.value;
  let contract = contract_no.value;
  let serviceType = service.value;
  let other = other_service.value;
  let priority = priority_sel.value;
  let issue = issue_desc.value;

  if(type === "AMC" && contract.trim() === "") {
    alert("Contract Number required");
    return;
  }

  let finalService = (serviceType === "Other") ? other : serviceType;

  let ticket = type + "-" + (contract || "NA") + "-" + Math.floor(Math.random()*999999);

  ticket_no.innerText = "Ticket No: " + ticket;

  /* SAVE TICKET */
  let tickets = JSON.parse(localStorage.getItem("tickets") || "[]");

  let currentUser = JSON.parse(localStorage.getItem("currentUser") || "{}");

  tickets.push({
    id: ticket,
    userId: currentUser.userId || "ADMIN",
    name: c_name.value,
    company: c_company.value,
    mobile: c_mobile.value,
    email: c_email.value,
    service: finalService,
    priority: priority,
    issue: issue,
    status: "Open",
    createdAt: new Date().toLocaleString()
  });

  localStorage.setItem("tickets", JSON.stringify(tickets));

  loadDashboard();

  /* MAIL REDIRECT */
  let subject = encodeURIComponent("Ticket No: " + ticket);

  let body = encodeURIComponent(
    "===== BYTENEX SERVICE REQUEST =====\n\n" +

    "Ticket No: " + ticket + "\n" +
    "Date: " + new Date().toLocaleString() + "\n\n" +

    "Customer Details:\n" +
    "Name: " + c_name.value + "\n" +
    "Company: " + c_company.value + "\n" +
    "Mobile: " + c_mobile.value + "\n" +
    "Email: " + c_email.value + "\n\n" +

    "Service Details:\n" +
    "Type: " + type + "\n" +
    "Contract: " + contract + "\n" +
    "Service: " + finalService + "\n" +
    "Priority: " + priority + "\n\n" +

    "Issue:\n" + issue + "\n\n" +

    "===== END ====="
  );

  window.location.href =
    "mailto:info@bytenexinnovation.in,engineers@bytenexinnovation.in" +
    "?subject=" + subject +
    "&body=" + body;
}

</script>

</head>

<body>

<h2>Bytenex Customer Portal</h2>

<!-- LOGIN -->
<div id="login_box" class="container">
  <input id="user_email" placeholder="USER ID / ADMIN EMAIL">
  <input id="user_pass" type="password" placeholder="Password">

  <button onclick="login()">Login</button>

  <div>
    <span class="link" onclick="showRegister()">Create Account</span>
    <span class="link" onclick="forgotPassword()">Forgot Password</span>
  </div>
</div>

<!-- REGISTER -->
<div id="register_box" class="container" style="display:none;">
  <input id="r_name" placeholder="Name">
  <input id="r_email" placeholder="Email">
  <input id="r_mobile" placeholder="Mobile">
  <input id="r_company" placeholder="Company">
  <input id="r_pass" type="password" placeholder="Password">

  <button onclick="register()">Create Account</button>
  <p class="link" onclick="showLogin()">Back to Login</p>
</div>

<!-- PORTAL -->
<div id="portal" class="container" style="display:none;">

  <button onclick="logout()" style="background:#ff4d4d; margin-bottom:10px;">
    Logout
  </button>

  <h3>Dashboard</h3>

  <div style="display:flex; justify-content:space-between;">
    <div>Total: <span id="total_count">0</span></div>
    <div>Open: <span id="open_count">0</span></div>
    <div>Closed: <span id="close_count">0</span></div>
  </div>

  <h3>Tickets</h3>
  <div id="ticket_list"></div>

  <hr>

  <h3>Raise Ticket</h3>

  <input id="c_name" placeholder="Name">
  <input id="c_company" placeholder="Company">
  <input id="c_mobile" placeholder="Mobile">
  <input id="c_email" placeholder="Email">

  <select id="type_sel">
    <option>AMC</option>
    <option>NONAMC</option>
  </select>

  <input id="contract_no" placeholder="Contract Number">

  <select id="service" onchange="toggleOtherField()">
    <option>Repair</option>
    <option>Replacement</option>
    <option>Installation</option>
    <option value="Other">Other</option>
  </select>

  <div id="other_box" style="display:none;">
    <textarea id="other_service"></textarea>
  </div>

  <select id="priority_sel">
    <option>Low</option>
    <option>Medium</option>
    <option>High</option>
    <option>Critical</option>
  </select>

  <textarea id="issue_desc"></textarea>

  <button onclick="generateTicket()">Submit</button>

  <div id="ticket_no" style="color:#00eaff;margin-top:10px;"></div>

</div>

<div class="footer">
© 2026 Bytenex Innovation
</div>

</body>
</html>
