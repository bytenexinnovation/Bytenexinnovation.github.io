<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Bytenex Customer Portal</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>

body {
  margin:0;
  font-family:'Segoe UI', sans-serif;
  background:#f4f8fb;
  position:relative;
}

/* SUBTLE BACKGROUND ICONS */
body::before {
  content:"\f013 \f0c0 \f1eb \f108 \f233";
  font-family:"Font Awesome 6 Free";
  font-weight:900;
  position:absolute;
  top:0;
  left:0;
  width:100%;
  height:100%;
  font-size:120px;
  color:rgba(0,0,0,0.03);
  display:flex;
  flex-wrap:wrap;
  justify-content:space-around;
  align-items:center;
  pointer-events:none;
}

/* HEADER */
.header {
  text-align:center;
  padding:20px;
  font-size:26px;
  font-weight:bold;
  color:#0d6efd;
}

.slogan {
  text-align:center;
  color:#555;
  margin-top:-10px;
  font-size:14px;
}

/* CONTAINER */
.container {
  width:400px;
  max-width:90%;
  margin:30px auto;
  background:white;
  padding:25px;
  border-radius:15px;
  box-shadow:0 5px 20px rgba(0,0,0,0.1);
}

/* INPUT GROUP */
.input-group { position:relative; }

.input-group i {
  position:absolute;
  top:50%;
  left:12px;
  transform:translateY(-50%);
  color:#888;
}

/* INPUT */
input, select, textarea {
  width:100%;
  padding:12px 12px 12px 38px;
  margin:10px 0;
  border-radius:8px;
  border:1px solid #ccc;
  box-sizing:border-box;
}

/* BUTTON */
button {
  width:100%;
  padding:12px;
  background:#0d6efd;
  color:white;
  border:none;
  border-radius:8px;
  cursor:pointer;
}

/* LINKS */
.link {text-align:center;color:#0d6efd;cursor:pointer;}

/* DASHBOARD */
.dashboard {display:none;padding:20px;}

.topbar {
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.logout {
  background:#dc3545;
  border:none;
  padding:6px 12px;
  color:white;
  border-radius:6px;
}

/* CARD */
.card {
  background:white;
  padding:12px;
  border-radius:10px;
  margin-bottom:10px;
  box-shadow:0 3px 10px rgba(0,0,0,0.08);
}

/* TICKET */
.ticket {
  background:white;
  padding:12px;
  margin:10px 0;
  border-radius:10px;
  box-shadow:0 3px 10px rgba(0,0,0,0.08);
}

footer {
  text-align:center;
  color:#555;
  margin-top:20px;
}

</style>
</head>

<body>

<div class="header">Bytenex Customer Portal</div>
<div class="slogan">Empowering Smart Infrastructure & Seamless Support</div>

<!-- बाकी पूरा HTML SAME रहेगा (JS + structure change नहीं करना है) -->

</body>
</html>
