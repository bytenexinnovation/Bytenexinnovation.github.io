<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Bytenex Customer Portal</title>

<style>
body {font-family: Arial;margin:0;background:#eef2f7;}
.header {background:#0d6efd;color:white;text-align:center;padding:15px;font-size:22px;font-weight:bold;}
.container {width:400px;margin:30px auto;background:white;padding:20px;border-radius:10px;}
input, select, textarea {width:100%;margin:8px 0;padding:10px;}
button {width:100%;padding:10px;background:#0d6efd;color:white;border:none;cursor:pointer;}
.link {color:#0d6efd;cursor:pointer;margin-top:5px;}
.dashboard {display:none;padding:20px;}
.ticket {background:white;padding:10px;margin:10px 0;border-radius:8px;}
.topbar {display:flex;justify-content:space-between;align-items:center;}
.logout {background:red;padding:5px 10px;cursor:pointer;border:none;color:white;}
footer {text-align:center;margin-top:20px;}
</style>

</head>

<body>

<div class="header">Bytenex Customer Portal</div>

<!-- LOGIN -->
<div class="container" id="loginPage">
<h3>Login</h3>
<input id="loginId" placeholder="User ID / Admin Email">
<input id="loginPass" type="password" placeholder="Password">
<button onclick="login()">Login</button>
<div class="link" onclick="showCreate()">Create Account</div>
<div class="link" onclick="showForgot()">Forgot Password</div>
</div>

<!-- CREATE ACCOUNT -->
<div class="container" id="createPage" style="display:none">
<h3>Create Account</h3>
<input id="name" placeholder="Name">
<input id="phone" placeholder="Phone">
<input id="org" placeholder="Organisation">
<input id="location" placeholder="Location">
<input id="email" placeholder="Email">
<input id="pass" type="password" placeholder="Password">
<input id="cpass" type="password" placeholder="Confirm Password">
<button onclick="createAccount()">Create Account</button>
</div>

<!-- FORGOT -->
<div class="container" id="forgotPage" style="display:none">
<h3>Reset Password</h3>
<input id="femail" placeholder="Email">
<input id="forg" placeholder="Organisation">
<button onclick="resetPass()">Reset Password</button>
</div>

<!-- DASHBOARD -->
<div class="dashboard" id="dashboard">

<div class="topbar">
<h2>Dashboard</h2>
<button class="logout" onclick="logout()">Logout</button>
</div>

<h3>Tickets</h3>
<div id="ticketList"></div>

<!-- CUSTOMER ONLY -->
<div id="ticketForm">

<h3>New Service Request</h3>

<input id="reqName" placeholder="Requester Name">
<input id="pono" placeholder="PO No">

<select id="stype">
<option>AMC</option>
<option>NAMC</option>
<option>New Order</option>
<option>Other</option>
</select>

<select id="scat">
<option>Installation</option>
<option>R&M</option>
<option>Periodic Service</option>
<option>Replacement</option>
<option>Other</option>
</select>

<input id="issueLoc" placeholder="Location">

<textarea id="desc" placeholder="Minimum 2 lines description"></textarea>

<button onclick="submitTicket()">Submit</button>

</div>

</div>

<footer>© Bytenex Innovation</footer>

<script>

let currentUser=null;
let role="customer";

// LOGIN
function login(){
  let id=document.getElementById("loginId").value;
  let pass=document.getElementById("loginPass").value;

  if(id==="info@bytenexinnovation.in" && pass==="Asktoyash@1997"){
    role="admin"; currentUser="admin";
  }
  else if(id==="engineers@bytenexinnovation.in" && pass==="ByteAdmin@123"){
    role="engineer"; currentUser="engineer";
  }
  else{
    let users=JSON.parse(localStorage.getItem("users")||"[]");
    let u=users.find(x=>x.userid===id && x.pass===pass);
    if(!u){ alert("Invalid login"); return; }
    currentUser=u.userid;
    role="customer";
  }

  document.getElementById("loginPage").style.display="none";
  document.getElementById("dashboard").style.display="block";

  if(role!=="customer"){
    document.getElementById("ticketForm").style.display="none";
  }

  loadTickets();
}

// LOGOUT
function logout(){
  location.reload();
}

// CREATE ACCOUNT
function createAccount(){

  let name=document.getElementById("name").value.trim();
  let phone=document.getElementById("phone").value.trim();
  let org=document.getElementById("org").value.trim();
  let location=document.getElementById("location").value.trim();
  let email=document.getElementById("email").value.trim();
  let pass=document.getElementById("pass").value;
  let cpass=document.getElementById("cpass").value;

  if(!name || !phone || !org || !location || !email || !pass || !cpass){
    alert("All fields required");
    return;
  }

  if(pass !== cpass){
    alert("Password mismatch");
    return;
  }

  let uid="BYTIN01A-"+Math.floor(Math.random()*9999)+"Z"+Math.floor(Math.random()*99999);

  let users=JSON.parse(localStorage.getItem("users")||"[]");

  users.push({
    name:name,
    phone:phone,
    org:org,
    location:location,
    email:email,
    pass:pass,
    userid:uid
  });

  localStorage.setItem("users",JSON.stringify(users));

  alert("Account Created!\nYour User ID: "+uid);

  document.getElementById("createPage").style.display="none";
  document.getElementById("loginPage").style.display="block";
}

// RESET PASSWORD (FULL FIXED)
function resetPass(){

  let email=document.getElementById("femail").value.trim();
  let org=document.getElementById("forg").value.trim();

  if(!email || !org){
    alert("Please enter Email and Organisation");
    return;
  }

  let users=JSON.parse(localStorage.getItem("users")||"[]");

  let u=users.find(x =>
    x.email.toLowerCase()===email.toLowerCase() &&
    x.org.toLowerCase()===org.toLowerCase()
  );

  if(!u){
    alert("Email & Organisation mismatch");
    return;
  }

  let newPass=Math.random().toString(36).slice(-8);
  u.pass=newPass;

  localStorage.setItem("users",JSON.stringify(users));

  alert("Your New Password: "+newPass);

  document.getElementById("forgotPage").style.display="none";
  document.getElementById("loginPage").style.display="block";
}

// SUBMIT TICKET + MAIL
function submitTicket(){

  let desc=document.getElementById("desc").value;

  if(desc.split("\n").length < 2){
    alert("Minimum 2 lines required");
    return;
  }

  let reqName=document.getElementById("reqName").value;
  let pono=document.getElementById("pono").value;
  let location=document.getElementById("issueLoc").value;

  let tickets=JSON.parse(localStorage.getItem("tickets")||"[]");

  let ticketNo="BYT/"+pono+"/"+Math.floor(Math.random()*900000000);

  let ticketData={
    user:currentUser,
    ticket:ticketNo,
    name:reqName,
    pono:pono,
    location:location,
    status:"Open",
    desc:desc
  };

  tickets.push(ticketData);
  localStorage.setItem("tickets",JSON.stringify(tickets));

  alert("Ticket Created: "+ticketNo);

  loadTickets();

  let subject="New Service Request - "+pono;

  let body=
`Ticket No: ${ticketNo}
Requester: ${reqName}
PO No: ${pono}
Location: ${location}

Issue Description:
${desc}`;

  let mailtoLink=`mailto:info@bytenexinnovation.in,engineers@bytenexinnovation.in?subject=${encodeURIComponent(subject)}&body=${encodeURIComponent(body)}`;

  window.location.href=mailtoLink;
}

// LOAD TICKETS
function loadTickets(){
  let tickets=JSON.parse(localStorage.getItem("tickets")||"[]");
  let div=document.getElementById("ticketList");
  div.innerHTML="";

  tickets.forEach((t,index)=>{

    if(role==="admin" || role==="engineer" || t.user===currentUser){

      let closeBtn="";

      if(role==="admin" && t.status==="Open"){
        closeBtn=`<button onclick="closeTicket(${index})">Close</button>`;
      }

      div.innerHTML+=`
      <div class="ticket">
      <b>${t.ticket}</b><br>
      Name: ${t.name}<br>
      PO: ${t.pono}<br>
      Status: ${t.status}<br>
      ${t.remarks ? "Remarks: "+t.remarks+"<br>" : ""}
      ${t.rca ? "RCA: "+t.rca+"<br>" : ""}
      ${t.closedDate ? "Closed On: "+t.closedDate+"<br>" : ""}
      ${t.closedBy ? "Closed By: "+t.closedBy+"<br>" : ""}
      ${closeBtn}
      </div>`;
    }
  });
}

// CLOSE TICKET
function closeTicket(index){

  let remarks=prompt("Enter Closing Remarks:");
  let rca=prompt("Enter RCA:");
  let date=new Date().toLocaleDateString();

  if(!remarks || !rca){
    alert("All details required");
    return;
  }

  let tickets=JSON.parse(localStorage.getItem("tickets")||"[]");

  tickets[index].status="Closed";
  tickets[index].remarks=remarks;
  tickets[index].rca=rca;
  tickets[index].closedDate=date;
  tickets[index].closedBy="Admin";

  localStorage.setItem("tickets",JSON.stringify(tickets));

  loadTickets();
}

// NAVIGATION
function showCreate(){
  document.getElementById("loginPage").style.display="none";
  document.getElementById("createPage").style.display="block";
}

function showForgot(){
  document.getElementById("loginPage").style.display="none";
  document.getElementById("forgotPage").style.display="block";
}

</script>

</body>
</html>
