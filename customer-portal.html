<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Customer Portal - Bytenex</title>

<style>
body {
  font-family: Arial;
  background: #0b0f1a;
  color: white;
  text-align: center;
  padding: 20px;
}

.container {
  max-width: 500px;
  margin: auto;
  background: #111827;
  padding: 20px;
  border-radius: 10px;
}

input, select, textarea {
  width: 100%;
  padding: 10px;
  margin: 8px 0;
  border-radius: 5px;
  border: none;
}

button {
  padding: 10px 20px;
  background: #00eaff;
  border: none;
  border-radius: 20px;
  cursor: pointer;
}

.ticket {
  margin-top: 20px;
  font-size: 18px;
  color: #00eaff;
}

.footer {
  margin-top: 30px;
  font-size: 12px;
  color: #aaa;
}
</style>

<script>

// REGISTER
function register() {
  let userData = {
    name: r_name.value,
    email: r_email.value,
    mobile: r_mobile.value,
    location: r_location.value,
    company: r_company.value,
    password: r_pass.value
  };

  localStorage.setItem(userData.email, JSON.stringify(userData));
  alert("Account Created!");
  register_box.style.display = "none";
  login_box.style.display = "block";
}

// LOGIN
function login() {
  let data = JSON.parse(localStorage.getItem(user.value));

  if(data && data.password === passw.value) {
    login_box.style.display = "none";
    portal.style.display = "block";

    c_name.value = data.name;
    c_company.value = data.company;
    c_mobile.value = data.mobile;
    c_email.value = data.email;
  } else {
    alert("Invalid Login");
  }
}

// GENERATE TICKET + OPEN MAIL
function generateTicket() {
  let type = type_sel.value;
  let service = service_sel.value;
  let issue = issue_desc.value;

  let random = Math.floor(Math.random() * 9999999);
  let ticket = type + "/" + service + "/" + random;

  document.getElementById("ticket").innerText = "Ticket No: " + ticket;

  // Mail content
  let subject = encodeURIComponent("Service Ticket - " + ticket);

  let body = encodeURIComponent(
    "Customer Name: " + c_name.value + "\n" +
    "Email: " + c_email.value + "\n" +
    "Mobile: " + c_mobile.value + "\n" +
    "Company: " + c_company.value + "\n\n" +
    "Issue:\n" + issue + "\n\n" +
    "Ticket No: " + ticket
  );

  // Mailto link
  let mailtoLink = "mailto:engineers@bytenexinnovation.in,info@bytenexinnovation.in"
                   + "?subject=" + subject
                   + "&body=" + body;

  // Open mail client
  window.location.href = mailtoLink;
}

// SWITCH
function showRegister(){
  login_box.style.display="none";
  register_box.style.display="block";
}

function showLogin(){
  register_box.style.display="none";
  login_box.style.display="block";
}

</script>

</head>

<body>

<h2>Customer Portal</h2>

<!-- LOGIN -->
<div id="login_box" class="container">
  <input type="text" id="user" placeholder="Email">
  <input type="password" id="passw" placeholder="Password">
  <button onclick="login()">Login</button>
  <p onclick="showRegister()" style="cursor:pointer;color:#00eaff;">Create Account</p>
</div>

<!-- REGISTER -->
<div id="register_box" class="container" style="display:none;">
  <input id="r_name" placeholder="Name">
  <input id="r_email" placeholder="Email">
  <input id="r_mobile" placeholder="Mobile">
  <input id="r_location" placeholder="Location">
  <input id="r_company" placeholder="Company">
  <input id="r_pass" type="password" placeholder="Password">
  <button onclick="register()">Create</button>
  <p onclick="showLogin()" style="cursor:pointer;color:#00eaff;">Back to Login</p>
</div>

<!-- PORTAL -->
<div id="portal" class="container" style="display:none;">
  <input id="c_name" placeholder="Customer Name">
  <input id="c_company" placeholder="Company">
  <input id="c_mobile" placeholder="Mobile">
  <input id="c_email" placeholder="Email">

  <select id="type_sel">
    <option value="AMC">AMC</option>
    <option value="NONAMC">NON AMC</option>
  </select>

  <select id="service_sel">
    <option value="BI">BI</option>
    <option value="SERVICE">SERVICE</option>
  </select>

  <!-- NEW FIELD -->
  <textarea id="issue_desc" placeholder="Describe your issue..."></textarea>

  <button onclick="generateTicket()">Submit Request</button>

  <div id="ticket" class="ticket"></div>
</div>

<div class="footer">
  © 2026 Bytenex Innovation. All Rights Reserved.
</div>

</body>
</html>
