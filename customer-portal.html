<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Bytenex Customer Portal</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>
body{
  margin:0;
  font-family:'Segoe UI',sans-serif;
  background:#f4f8fb;
  position:relative;
}

body::before{
  content:"\f085 \f1eb \f0ad \f233 \f108 \f7c0 \f0e8";
  font-family:"Font Awesome 6 Free";
  font-weight:900;
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  font-size:140px;
  color:rgba(0,0,0,0.03);
  display:flex;
  flex-wrap:wrap;
  justify-content:space-around;
  align-items:center;
  pointer-events:none;
}

.header{
  text-align:center;
  padding:20px;
  font-size:26px;
  font-weight:bold;
  color:#0d6efd;
}

.slogan{
  text-align:center;
  color:#555;
  font-size:14px;
  margin-top:-10px;
}

.container{
  width:400px;
  max-width:90%;
  margin:30px auto;
  background:white;
  padding:25px;
  border-radius:15px;
  box-shadow:0 5px 20px rgba(0,0,0,0.1);
  position:relative;
  z-index:1;
}

input,select,textarea{
  width:100%;
  padding:12px;
  margin:10px 0;
  border-radius:8px;
  border:1px solid #ccc;
  box-sizing:border-box;
}

button{
  width:100%;
  padding:12px;
  background:#0d6efd;
  color:white;
  border:none;
  border-radius:8px;
  cursor:pointer;
}

.dashboard{
  display:none;
  padding:20px;
}

.card{
  background:white;
  padding:12px;
  border-radius:10px;
  margin-bottom:10px;
  box-shadow:0 3px 10px rgba(0,0,0,0.08);
}

.ticket{
  background:white;
  padding:12px;
  margin:10px 0;
  border-radius:10px;
  box-shadow:0 3px 10px rgba(0,0,0,0.08);
}

.topbar{
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.small-btn,.logout-btn{
  background:#28a745;
  width:auto;
  padding:6px 10px;
  font-size:12px;
  border-radius:6px;
  border:none;
  color:white;
}

#profileModal{
  display:none;
  position:fixed;
  top:0;left:0;
  width:100%;height:100%;
  background:rgba(0,0,0,0.4);
  z-index:999;
}

.modal-box{
  background:white;
  width:350px;
  max-width:90%;
  margin:120px auto;
  padding:20px;
  border-radius:12px;
}
</style>
</head>

<body>

<div class="header">Bytenex Customer Portal</div>
<div class="slogan">Empowering Smart Infrastructure & Seamless Support</div>

<!-- LOGIN -->
<div class="container" id="loginPage">

<h3><i class="fa fa-lock"></i> Login</h3>

<input id="loginId" placeholder="User ID / Email">
<input id="loginPass" type="password" placeholder="Password">

<button onclick="login()">Login</button>

</div>

<!-- CREATE -->
<div class="container" id="createPage" style="display:none">

<h3>Create Account</h3>

<input id="name" placeholder="Name">
<input id="phone" placeholder="Phone">
<input id="org" placeholder="Organisation">
<input id="location" placeholder="Location">
<input id="email" placeholder="Email">
<input id="pass" type="password" placeholder="Password">
<input id="cpass" type="password" placeholder="Confirm Password">

<button onclick="createAccount()">Create Account</button>

</div>

<!-- DASHBOARD -->
<div class="dashboard" id="dashboard">

<div class="topbar">
<h2>Dashboard</h2>

<div>
<button class="small-btn" onclick="editProfile()">Edit</button>
<button class="logout-btn" onclick="logout()">Logout</button>
</div>

</div>

<div id="customerDetails"></div>

<h3>Tickets</h3>
<div id="ticketList"></div>

</div>

<!-- MODAL -->
<div id="profileModal">
<div class="modal-box">

<h3>Edit Profile</h3>

<input id="editName">
<input id="editOrg">
<input id="editLoc">

<button onclick="saveProfile()">Save</button>
<button onclick="closeModal()" style="background:red;color:white;border:none;margin-top:10px;">Cancel</button>

</div>
</div>

<script>

let role="customer";

/* LOGIN FIXED (RIDDHI BUG REMOVED) */
function login(){

let id=document.getElementById("loginId").value;
let pass=document.getElementById("loginPass").value;

let users=JSON.parse(localStorage.getItem("users")||"[]");

/* CLEAR OLD SESSION */
localStorage.removeItem("currentUserData");

/* INFO ADMIN */
if(id==="info@bytenexinnovation.in" && pass==="Asktoyash@1997"){
  role="admin";
  localStorage.setItem("currentUserData",JSON.stringify({
    name:"Info Admin",
    org:"Bytenex Innovation",
    location:"Head Office"
  }));
}

/* ENGINEER ADMIN */
else if(id==="engineers@bytenexinnovation.in" && pass==="ByteAdmin@123"){
  role="admin";
  localStorage.setItem("currentUserData",JSON.stringify({
    name:"Engineer Team",
    org:"Bytenex Engineering",
    location:"Service Division"
  }));
}

/* CUSTOMER */
else{
  let u=users.find(x=>x.userid===id && x.pass===pass);
  if(!u){alert("Invalid login");return;}

  role="customer";
  localStorage.setItem("currentUserData",JSON.stringify(u));
}

/* UI */
loginPage.style.display="none";
dashboard.style.display="block";

loadCustomerDetails();
loadTickets();
}

/* CREATE */
function createAccount(){

let n=name.value.trim();
let p=phone.value.trim();
let o=org.value.trim();
let l=location.value.trim();
let e=email.value.trim();
let pw=pass.value;
let cp=cpass.value;

if(!n||!p||!o||!l||!e||!pw||!cp){
  alert("All fields required");return;
}

if(pw!==cp){
  alert("Password mismatch");return;
}

let uid="BYTIN01A-"+Math.floor(Math.random()*9999)+"Z"+Math.floor(Math.random()*99999);

let users=JSON.parse(localStorage.getItem("users")||"[]");

users.push({name:n,phone:p,org:o,location:l,email:e,pass:pw,userid:uid});

localStorage.setItem("users",JSON.stringify(users));

alert("User ID: "+uid);

createPage.style.display="none";
loginPage.style.display="block";
}

/* DASHBOARD SAFE */
function loadCustomerDetails(){

let u=JSON.parse(localStorage.getItem("currentUserData"));
if(!u || !u.name) return;

customerDetails.innerHTML=`
<div class="card">
<b>Welcome, ${u.name}</b><br>
${u.org}<br>
${u.location}
</div>`;
}

/* PROFILE */
function editProfile(){

let u=JSON.parse(localStorage.getItem("currentUserData"));

editName.value=u.name;
editOrg.value=u.org;
editLoc.value=u.location;

profileModal.style.display="block";
}

function saveProfile(){

let u=JSON.parse(localStorage.getItem("currentUserData"));

u.name=editName.value;
u.org=editOrg.value;
u.location=editLoc.value;

localStorage.setItem("currentUserData",JSON.stringify(u));

profileModal.style.display="none";
loadCustomerDetails();
}

/* LOGOUT */
function logout(){
location.reload();
}

</script>

</body>
</html>
