<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Bytenex Customer Portal</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>
body{
  margin:0;
  font-family:'Segoe UI',sans-serif;
  background:#f4f8fb;
  position:relative;
}

body::before{
  content:"\f085 \f1eb \f0ad \f233 \f108 \f7c0 \f0e8";
  font-family:"Font Awesome 6 Free";
  font-weight:900;
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  font-size:140px;
  color:rgba(0,0,0,0.03);
  display:flex;
  flex-wrap:wrap;
  justify-content:space-around;
  align-items:center;
  pointer-events:none;
}

.header{
  text-align:center;
  padding:20px;
  font-size:26px;
  font-weight:bold;
  color:#0d6efd;
}

.container{
  width:400px;
  max-width:90%;
  margin:30px auto;
  background:white;
  padding:25px;
  border-radius:15px;
  box-shadow:0 5px 20px rgba(0,0,0,0.1);
}

input,select,textarea{
  width:100%;
  padding:12px;
  margin:10px 0;
  border-radius:8px;
  border:1px solid #ccc;
  box-sizing:border-box;
}

button{
  width:100%;
  padding:12px;
  background:#0d6efd;
  color:white;
  border:none;
  border-radius:8px;
  cursor:pointer;
}

.dashboard{display:none;padding:20px;}

.card{
  background:white;
  padding:12px;
  border-radius:10px;
  margin-bottom:10px;
  box-shadow:0 3px 10px rgba(0,0,0,0.08);
}

.ticket{
  background:white;
  padding:12px;
  margin:10px 0;
  border-radius:10px;
  box-shadow:0 3px 10px rgba(0,0,0,0.08);
}

.topbar{
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.logout{
  background:#dc3545;
  border:none;
  padding:6px 12px;
  color:white;
  border-radius:6px;
}
</style>
</head>

<body>

<div class="header">Bytenex Customer Portal</div>

<!-- LOGIN -->
<div class="container" id="loginPage">
<h3>Login</h3>

<input id="loginId" placeholder="User ID / Email">
<input id="loginPass" type="password" placeholder="Password">

<button onclick="login()">Login</button>

<div onclick="showCreate()" style="text-align:center;color:#0d6efd;cursor:pointer;">Create Account</div>
<div onclick="showForgot()" style="text-align:center;color:#0d6efd;cursor:pointer;">Forgot Password</div>
</div>

<!-- CREATE -->
<div class="container" id="createPage" style="display:none">
<h3>Create Account</h3>

<input id="name">
<input id="phone">
<input id="org">
<input id="location">
<input id="email">
<input id="pass" type="password">
<input id="cpass" type="password">

<button onclick="createAccount()">Create</button>
</div>

<!-- FORGOT -->
<div class="container" id="forgotPage" style="display:none">
<h3>Reset Password</h3>

<input id="femail">
<input id="forg">

<button onclick="resetPass()">Reset</button>
</div>

<!-- DASHBOARD -->
<div class="dashboard" id="dashboard">

<div class="topbar">
<h2>Dashboard</h2>
<button class="logout" onclick="logout()">Logout</button>
</div>

<div id="customerDetails"></div>

<h3>Tickets</h3>
<div id="ticketList"></div>

<!-- FORM -->
<div id="ticketForm">

<h3>New Service Request</h3>

<input id="reqName" placeholder="Requester Name">
<input id="pono" placeholder="PO No">

<select id="stype">
<option>AMC</option>
<option>NAMC</option>
<option>New Order</option>
<option>Other</option>
</select>

<select id="scat">
<option>Installation</option>
<option>R&M</option>
<option>Periodic Service</option>
<option>Replacement</option>
<option>Other</option>
</select>

<input id="issueLoc">
<textarea id="desc"></textarea>

<button onclick="submitTicket()">Submit</button>

</div>

</div>

<script>

let currentUser=null;
let role="customer";

/* LOGIN */
function login(){

let id=document.getElementById("loginId").value;
let pass=document.getElementById("loginPass").value;

let users=JSON.parse(localStorage.getItem("users")||"[]");

localStorage.removeItem("currentUserData");

if(id==="info@bytenexinnovation.in" && pass==="Asktoyash@1997"){
role="admin"; currentUser="admin";
}
else if(id==="engineers@bytenexinnovation.in"){
role="engineer"; currentUser="engineer";
}
else{
let u=users.find(x=>x.userid===id && x.pass===pass);
if(!u){alert("Invalid login");return;}
currentUser=u.userid;
role="customer";
localStorage.setItem("currentUserData",JSON.stringify(u));
}

loginPage.style.display="none";
dashboard.style.display="block";

document.getElementById("ticketForm").style.display =
(role==="customer")?"block":"none";

loadCustomerDetails();
loadTickets();
}

/* CREATE FIX */
function createAccount(){

let n=name.value.trim();
let p=phone.value.trim();
let o=org.value.trim();
let l=location.value.trim();
let e=email.value.trim();
let pw=pass.value;
let cp=cpass.value;

if(!n||!p||!o||!l||!e||!pw||!cp){
alert("All fields required");return;
}

if(pw!==cp){
alert("Password mismatch");return;
}

let uid="BYT-"+Math.floor(Math.random()*99999);

let users=JSON.parse(localStorage.getItem("users")||"[]");
users.push({name:n,phone:p,org:o,location:l,email:e,pass:pw,userid:uid});

localStorage.setItem("users",JSON.stringify(users));

alert("Created: "+uid);

createPage.style.display="none";
loginPage.style.display="block";
}

/* RESET FIX */
function resetPass(){

let email=femail.value.trim();
let org=forg.value.trim();

let users=JSON.parse(localStorage.getItem("users")||"[]");

let u=users.find(x=>x.email===email && x.org===org);

if(!u){alert("Not found");return;}

let newPass=Math.random().toString(36).slice(-8);

u.pass=newPass;

localStorage.setItem("users",JSON.stringify(users));

alert("New Password: "+newPass);

forgotPage.style.display="none";
loginPage.style.display="block";
}

/* TICKET FIX */
function submitTicket(){

let d=desc.value.trim();

let lines=d.split("\n").filter(x=>x.trim()!=="");

if(lines.length<2){
alert("Minimum 2 lines required");return;
}

let req=reqName.value;
let po=pono.value;
let loc=issueLoc.value;
let stype=stype.value;
let scat=scat.value;

let tickets=JSON.parse(localStorage.getItem("tickets")||"[]");

let ticketNo="BYT/"+po+"/"+Math.floor(Math.random()*999999);

tickets.push({
user:currentUser,
ticket:ticketNo,
name:req,
pono:po,
location:loc,
stype:stype,
scat:scat,
status:"Open",
desc:d
});

localStorage.setItem("tickets",JSON.stringify(tickets));

loadTickets();

/* MAIL FIX */
let body=`Ticket:${ticketNo}
Req:${req}
PO:${po}
Type:${stype}
Cat:${scat}
Loc:${loc}

${d}`;

window.location.href=
`mailto:info@bytenexinnovation.in,engineers@bytenexinnovation.in?body=${encodeURIComponent(body)}`;
}

/* LOAD */
function loadTickets(){

let t=JSON.parse(localStorage.getItem("tickets")||"[]");

ticketList.innerHTML="";

t.forEach(x=>{
ticketList.innerHTML+=`
<div class="ticket">
<b>${x.ticket}</b><br>
${x.name}<br>
${x.pono}<br>
${x.status}<br>
${x.desc}
</div>`;
});
}

/* NAV */
function showCreate(){
loginPage.style.display="none";
createPage.style.display="block";
}

function showForgot(){
loginPage.style.display="none";
forgotPage.style.display="block";
}

function logout(){location.reload();}

</script>

</body>
</html>
