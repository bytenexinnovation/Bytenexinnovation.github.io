<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Bytenex Customer Portal</title>

<style>
body {
  font-family: 'Segoe UI', Arial;
  background: #f5f5f5;
  color: #333;
  text-align: center;
  padding: 20px;
}

.container {
  max-width: 700px;
  margin: auto;
  background: #fff;
  padding: 25px;
  border-radius: 12px;
  margin-bottom: 15px;
  border: 1px solid #eee;
  box-shadow: 0 5px 15px rgba(0,0,0,0.05);
}

input, select, textarea {
  width: 100%;
  padding: 12px;
  margin: 8px 0;
  border-radius: 8px;
  border: 1px solid #ddd;
}

input:focus, select:focus, textarea:focus {
  outline: none;
  border: 1px solid #00aaff;
  box-shadow: 0 0 5px rgba(0,170,255,0.3);
}

button {
  padding: 12px;
  width: 100%;
  background: #00aaff;
  border: none;
  border-radius: 25px;
  cursor: pointer;
  color: #fff;
  font-weight: bold;
}

button:hover {
  background: #0077aa;
}

.link {
  color: #00aaff;
  cursor: pointer;
  margin: 5px;
  display: inline-block;
}

.footer {
  margin-top: 20px;
  font-size: 12px;
  color: #888;
}

.ticket {
  background:#f9f9f9;
  padding:12px;
  margin:10px 0;
  border-radius:10px;
  text-align:left;
  border:1px solid #eee;
}
</style>

<script>
function generateUserId() {
  return "BNTINV" + Math.floor(Math.random()*999999) + "A";
}

function register() {
  let userId = generateUserId();

  let user = {
    userId,
    name: r_name.value,
    email: r_email.value,
    mobile: r_mobile.value,
    company: r_company.value,
    siteName: r_site_name.value,
    siteAddress: r_site_address.value,
    password: r_pass.value,
    role: "customer"
  };

  localStorage.setItem(userId, JSON.stringify(user));
  alert("USER ID: " + userId);
  showLogin();
}

function login() {
  let input = user_email.value;
  let pass = user_pass.value;

  if(input === "info@bytenexinnovation.in") {
    localStorage.setItem("currentUser", JSON.stringify({role:"admin",email:input}));
    portal.style.display="block";
    login_box.style.display="none";
    loadDashboard();
    return;
  }

  let user = JSON.parse(localStorage.getItem(input));

  if(user && user.password === pass){
    localStorage.setItem("currentUser", JSON.stringify(user));
    portal.style.display="block";
    login_box.style.display="none";

    c_name.value=user.name;
    c_company.value=user.company;
    c_mobile.value=user.mobile;
    c_email.value=user.email;

    loadDashboard();
  } else alert("Invalid");
}

function logout(){
  localStorage.removeItem("currentUser");
  portal.style.display="none";
  login_box.style.display="block";
}

function showRegister(){ login_box.style.display="none"; register_box.style.display="block"; }
function showLogin(){ register_box.style.display="none"; login_box.style.display="block"; }

function generateTicket(){
  let ticket="T-"+Math.floor(Math.random()*999999);

  let tickets=JSON.parse(localStorage.getItem("tickets")||"[]");

  tickets.push({
    id:ticket,
    name:c_name.value,
    company:c_company.value,
    service:service.value,
    issue:issue_desc.value,
    status:"Open"
  });

  localStorage.setItem("tickets",JSON.stringify(tickets));
  ticket_no.innerText="Ticket: "+ticket;
  loadDashboard();
}

function loadDashboard(){
  let tickets=JSON.parse(localStorage.getItem("tickets")||"[]");
  let html="";
  tickets.forEach(t=>{
    html+=`<div class="ticket">
      <b>${t.id}</b><br>
      ${t.name} - ${t.company}<br>
      ${t.service}<br>
      ${t.issue}<br>
      Status: ${t.status}
    </div>`;
  });
  ticket_list.innerHTML=html;
}
</script>
</head>

<body>

<h2 style="color:#0077aa;">Bytenex Customer Portal</h2>

<div id="login_box" class="container">
  <input id="user_email" placeholder="USER ID">
  <input id="user_pass" type="password" placeholder="Password">
  <button onclick="login()">Login</button>
  <span class="link" onclick="showRegister()">Create Account</span>
</div>

<div id="register_box" class="container" style="display:none;">
  <input id="r_name" placeholder="Name">
  <input id="r_email" placeholder="Email">
  <input id="r_mobile" placeholder="Mobile">
  <input id="r_company" placeholder="Company">
  <input id="r_site_name" placeholder="Site Name">
  <textarea id="r_site_address" placeholder="Site Address"></textarea>
  <input id="r_pass" type="password" placeholder="Password">
  <button onclick="register()">Create Account</button>
</div>

<div id="portal" class="container" style="display:none;">

<h3>🛠 Register Complaint</h3>

<div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;">
<input id="c_name" placeholder="Name">
<input id="c_company" placeholder="Company">
<input id="c_mobile" placeholder="Mobile">
<input id="c_email" placeholder="Email">

<select id="service">
<option>Repair</option>
<option>Replacement</option>
<option>Installation</option>
</select>

<select>
<option>AMC</option>
<option>NON AMC</option>
</select>
</div>

<input placeholder="Contract Number">

<textarea id="issue_desc" placeholder="Describe issue"></textarea>

<button onclick="generateTicket()">Submit Complaint</button>

<div id="ticket_no"></div>

<hr>

<h3>Tickets</h3>
<div id="ticket_list"></div>

<button onclick="logout()" style="background:#ff4d4d;margin-top:10px;">Logout</button>

</div>

<div class="footer">© 2026 Bytenex Innovation</div>

</body>
</html>
