<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bytenex Customer Portal</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* Base Styles */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%); min-height: 100vh; color: #333; }
        
        .container { max-width: 500px; margin: 50px auto; padding: 20px; }
        .card { background: white; border-radius: 15px; box-shadow: 0 15px 35px rgba(0,0,0,0.1); padding: 30px; }
        
        .logo { text-align: center; margin-bottom: 20px; }
        .logo h1 { color: #2563eb; font-size: 26px; margin-top: 10px; }
        .logo i { font-size: 50px; color: #3b82f6; }

        .slogan { 
            background: linear-gradient(135deg, #10b981, #059669); 
            color: white; padding: 15px; border-radius: 12px; 
            margin-bottom: 25px; text-align: center; font-size: 14px; font-weight: 500;
        }

        /* Form Styles */
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 8px; font-weight: 500; color: #4b5563; }
        input, select, textarea { 
            width: 100%; padding: 12px; border: 2px solid #e5e7eb; 
            border-radius: 10px; font-size: 16px; transition: 0.3s;
        }
        input:focus { outline: none; border-color: #2563eb; }

        .btn { 
            width: 100%; padding: 14px; background: #2563eb; color: white; 
            border: none; border-radius: 10px; font-size: 16px; font-weight: 600; 
            cursor: pointer; transition: 0.3s; margin-top: 10px;
        }
        .btn:hover { background: #1d4ed8; transform: translateY(-2px); }
        .btn-secondary { background: #6b7280; }

        /* Dashboard Styles */
        .dashboard { max-width: 1100px; margin: 30px auto; padding: 20px; }
        .header { 
            background: white; padding: 20px; border-radius: 15px; 
            display: flex; justify-content: space-between; align-items: center;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05); margin-bottom: 25px;
        }
        .logout-btn { background: #ef4444; color: white; padding: 8px 18px; border-radius: 8px; text-decoration: none; font-weight: 600; }

        .grid { display: grid; grid-template-columns: 1fr 1.5fr; gap: 20px; }
        @media (max-width: 768px) { .grid { grid-template-columns: 1fr; } }

        .panel { background: white; padding: 25px; border-radius: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        .status-tag { padding: 4px 10px; border-radius: 20px; font-size: 12px; font-weight: bold; }
        .open { background: #fef3c7; color: #92400e; }
        .closed { background: #d1fae5; color: #065f46; }

        .hidden { display: none !important; }
        .alert { position: fixed; top: 20px; right: 20px; padding: 15px 25px; border-radius: 10px; color: white; z-index: 9999; }
        .alert-error { background: #ef4444; }
        .alert-success { background: #10b981; }
        footer { text-align: center; padding: 40px 0; color: #6b7280; font-size: 14px; }
    </style>
</head>
<body>

    <div id="loginPage" class="container">
        <div class="card">
            <div class="logo">
                <i class="fas fa-shield-alt"></i>
                <h1>Bytenex Portal</h1>
            </div>
            <div class="slogan">
                <i class="fas fa-headset"></i> Engineer Support - 24x7 Available
            </div>
            <form id="loginForm">
                <div class="form-group">
                    <label>User ID / Email</label>
                    <input type="text" id="loginId" required placeholder="Enter ID or Email">
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="loginPass" required placeholder="••••••••">
                </div>
                <button type="submit" class="btn">Login to Dashboard</button>
            </form>
            <div style="text-align:center; margin-top:20px; font-size: 14px;">
                <a href="javascript:void(0)" onclick="switchPage('createPage')" style="color:#2563eb; text-decoration:none;">Create Account</a>
            </div>
        </div>
    </div>

    <div id="createPage" class="container hidden">
        <div class="card">
            <h2>New Registration</h2>
            <p style="color:#6b7280; margin-bottom:10px;">Join Bytenex Innovation Support</p>
            <form id="createForm">
                <div class="form-group"><label>Full Name</label><input type="text" id="cName" required></div>
                <div class="form-group"><label>Email Address</label><input type="email" id="cEmail" required></div>
                <div class="form-group"><label>Phone Number</label><input type="tel" id="cPhone" required maxlength="10" placeholder="10-digit number"></div>
                <div class="form-group"><label>Organisation</label><input type="text" id="cOrg" required></div>
                <div class="form-group"><label>Site Address</label><input type="text" id="cSite" required></div>
                <div class="form-group"><label>Set Password</label><input type="password" id="cPass" required></div>
                <button type="submit" class="btn">Register & Generate ID</button>
                <button type="button" onclick="switchPage('loginPage')" class="btn btn-secondary">Back to Login</button>
            </form>
        </div>
    </div>

    <div id="customerDash" class="dashboard hidden">
        <div class="header">
            <div>
                <h2 id="welcomeText">Welcome</h2>
                <p id="siteText" style="color:#6b7280; font-size:14px;"></p>
            </div>
            <a href="javascript:void(0)" class="logout-btn" onclick="logout()">Logout</a>
        </div>
        
        <div class="grid">
            <div class="panel">
                <h3>Raise New Ticket</h3><br>
                <form id="ticketForm">
                    <div class="form-group">
                        <label>PO/WO Number</label>
                        <input type="text" id="poNo" required>
                    </div>
                    <div class="form-group">
                        <label>Issue Description</label>
                        <textarea id="issueDesc" rows="4" placeholder="Describe your technical issue..." required></textarea>
                        <small id="countText">0 words</small>
                    </div>
                    <button type="submit" id="submitBtn" class="btn" disabled>Submit Request</button>
                </form>
            </div>
            
            <div class="panel">
                <h3>My Recent Tickets</h3><br>
                <div id="ticketList">
                    <p style="color:#9ca3af;">No tickets raised yet.</p>
                </div>
            </div>
        </div>
    </div>

    <div id="alertBox" class="alert hidden"></div>
    <footer>© 2026 Bytenex Innovation. Fast Resolution Guaranteed.</footer>

    <script>
        // --- DATA & STATE ---
        let currentUser = null;
        const storageKey = 'bytenex_users';
        const ticketKey = 'bytenex_tickets';

        // Admin Master Account (Hamesha Active)
        const masterUsers = [
            {userId: "ADMIN-2026-INFO", name: "Admin", email: "info@bytenexinnovation.in", password: "Asktoyash@1997", site: "Mumbai HQ"}
        ];

        // --- NAVIGATION ---
        function switchPage(pageId) {
            document.getElementById('loginPage').classList.add('hidden');
            document.getElementById('createPage').classList.add('hidden');
            document.getElementById('customerDash').classList.add('hidden');
            document.getElementById(pageId).classList.remove('hidden');
            window.scrollTo(0,0);
        }

        function showAlert(msg, type) {
            const box = document.getElementById('alertBox');
            box.textContent = msg;
            box.className = `alert alert-${type}`;
            box.classList.remove('hidden');
            setTimeout(() => box.classList.add('hidden'), 4000);
        }

        // --- AUTH LOGIC (Updated with Email+Phone ID) ---
        document.getElementById('createForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const email = document.getElementById('cEmail').value;
            const phone = document.getElementById('cPhone').value;

            // ID Generation: BYTI- (Last 4 digits of Phone) + (First 3 letters of Email) - 2026
            const phonePart = phone.slice(-4);
            const emailPart = email.substring(0, 3).toUpperCase();
            const generatedID = `BYTI-${phonePart}${emailPart}-2026`;
            
            const newUser = {
                userId: generatedID,
                name: document.getElementById('cName').value,
                email: email,
                phone: phone,
                org: document.getElementById('cOrg').value,
                site: document.getElementById('cSite').value,
                password: document.getElementById('cPass').value
            };

            const users = JSON.parse(localStorage.getItem(storageKey)) || [];
            users.push(newUser);
            localStorage.setItem(storageKey, JSON.stringify(users));

            if(confirm(`Account Created Successfully!\n\nYour Unique ID: ${generatedID}\n\nPlease save this ID for future login.`)) {
                document.getElementById('loginId').value = generatedID;
                this.reset();
                switchPage('loginPage');
            }
        });

        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const idInput = document.getElementById('loginId').value.trim();
            const passInput = document.getElementById('loginPass').value;
            
            const localUsers = JSON.parse(localStorage.getItem(storageKey)) || [];
            const allUsers = [...masterUsers, ...localUsers];

            const user = allUsers.find(u => (u.userId === idInput || u.email === idInput) && u.password === passInput);

            if(user) {
                currentUser = user;
                loadDashboard();
                switchPage('customerDash');
                showAlert("✅ Login Successful!", "success");
            } else {
                showAlert("❌ Login Failed! Check ID/Password", "error");
            }
        });

        function loadDashboard() {
            document.getElementById('welcomeText').textContent = `Hello, ${currentUser.name}`;
            document.getElementById('siteText').textContent = `Customer ID: ${currentUser.userId} | Site: ${currentUser.site}`;
            renderTickets();
        }

        function logout() {
            currentUser = null;
            switchPage('loginPage');
        }

        // --- TICKET LOGIC ---
        document.getElementById('issueDesc').addEventListener('input', function() {
            const words = this.value.trim().split(/\s+/).filter(w => w.length > 0).length;
            document.getElementById('countText').textContent = `${words} words`;
            document.getElementById('submitBtn').disabled = words < 10;
        });

        document.getElementById('ticketForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const tickets = JSON.parse(localStorage.getItem(ticketKey)) || [];
            const newTicket = {
                id: 'TKT-' + Date.now(),
                userId: currentUser.userId,
                po: document.getElementById('poNo').value,
                desc: document.getElementById('issueDesc').value,
                status: 'Open',
                date: new Date().toLocaleDateString()
            };

            tickets.unshift(newTicket);
            localStorage.setItem(ticketKey, JSON.stringify(tickets));
            this.reset();
            document.getElementById('countText').textContent = "0 words";
            document.getElementById('submitBtn').disabled = true;
            renderTickets();
            showAlert("✅ Ticket Raised Successfully!", "success");
        });

        function renderTickets() {
            const tickets = JSON.parse(localStorage.getItem(ticketKey)) || [];
            const myTickets = tickets.filter(t => t.userId === currentUser.userId);
            const list = document.getElementById('ticketList');

            if(myTickets.length === 0) {
                list.innerHTML = '<p style="color:#9ca3af;">No tickets raised yet.</p>';
                return;
            }

            list.innerHTML = myTickets.map(t => `
                <div style="border-bottom: 1px solid #eee; padding: 15px 0;">
                    <div style="display:flex; justify-content:space-between; margin-bottom:5px;">
                        <strong>${t.id}</strong>
                        <span class="status-tag ${t.status.toLowerCase()}">${t.status}</span>
                    </div>
                    <p style="font-size:14px; color:#4b5563;">PO: ${t.po}</p>
                    <p style="font-size:13px; color:#9ca3af;">Date: ${t.date}</p>
                </div>
            `).join('');
        }
    </script>
</body>
</html>
