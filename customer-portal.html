<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Bytenex Customer Portal</title>

<style>
body {
  font-family: 'Segoe UI', Arial;
  background: linear-gradient(135deg, #0b0f1a, #111827);
  color: white;
  text-align: center;
  padding: 20px;
}

.container {
  max-width: 700px;
  margin: auto;
  background: #1f2937;
  padding: 25px;
  border-radius: 12px;
  margin-bottom: 15px;
}

input, select, textarea {
  width: 100%;
  padding: 12px;
  margin: 8px 0;
  border-radius: 8px;
  border: 1px solid #374151;
  background: #111827;
  color: white;
}

input:focus, select:focus, textarea:focus {
  border-color: #00eaff;
  box-shadow: 0 0 6px #00eaff55;
  outline: none;
}

button {
  padding: 12px;
  width: 100%;
  background: #00eaff;
  border: none;
  border-radius: 25px;
  cursor: pointer;
  margin-top: 8px;
}

.link {
  color: #00eaff;
  cursor: pointer;
  margin: 5px;
  display: inline-block;
}

label {
  font-size: 13px;
  color: #9ca3af;
  margin-top: 10px;
  display: block;
}

.footer {
  margin-top: 20px;
  font-size: 12px;
  color: #aaa;
}
</style>

<script>

/* ================= USER ID ================= */
function generateUserId() {
  return "BNTINV" + Math.floor(Math.random() * 1999999 + 1) + "A";
}

/* ================= REGISTER ================= */
function register() {

  let userId = generateUserId();

  let user = {
    userId: userId,
    name: r_name.value,
    email: r_email.value,
    mobile: r_mobile.value,
    company: r_company.value,
    siteName: r_site_name.value,
    siteAddress: r_site_address.value,
    password: r_pass.value,
    role: "customer"
  };

  localStorage.setItem(userId, JSON.stringify(user));

  alert("Account Created!\nUSER ID: " + userId);

  showLogin();
}

/* ================= LOGIN ================= */
function login() {

  let input = user_email.value;
  let pass = user_pass.value;

  if(input === "info@bytenexinnovation.in") {

    localStorage.setItem("currentUser", JSON.stringify({
      email: input,
      name: "Admin",
      role: "admin"
    }));

    portal.style.display = "block";
    login_box.style.display = "none";

    welcome_user.innerText = "Admin";
    loadDashboard();
    return;
  }

  let user = JSON.parse(localStorage.getItem(input));

  if(user && user.password === pass) {

    localStorage.setItem("currentUser", JSON.stringify(user));

    portal.style.display = "block";
    login_box.style.display = "none";

    welcome_user.innerText = user.name;

    c_name.value = user.name;
    c_company.value = user.company;
    c_mobile.value = user.mobile;
    c_email.value = user.email;

    site_name.innerText = user.siteName;
    site_address.innerText = user.siteAddress;

    loadDashboard();

  } else {
    alert("Invalid Login");
  }
}

/* ================= LOGOUT ================= */
function logout() {
  localStorage.removeItem("currentUser");
  portal.style.display = "none";
  login_box.style.display = "block";
}

/* ================= FORGOT PASSWORD ================= */
function forgotPassword() {

  let id = prompt("Enter USER ID:");
  let user = JSON.parse(localStorage.getItem(id));

  if(!user) return alert("User not found");

  let pass = prompt("New Password:");
  if(!pass) return;

  user.password = pass;
  localStorage.setItem(id, JSON.stringify(user));

  alert("Password Updated");
}

/* ================= UI SWITCH ================= */
function showRegister(){
  login_box.style.display="none";
  register_box.style.display="block";
}

function showLogin(){
  register_box.style.display="none";
  login_box.style.display="block";
}

/* ================= SERVICE ================= */
function toggleOtherField() {
  other_box.style.display = service.value === "Other" ? "block" : "none";
}

/* ================= CLOSE TICKET ================= */
function closeTicket(id) {

  let user = JSON.parse(localStorage.getItem("currentUser"));

  let tickets = JSON.parse(localStorage.getItem("tickets") || "[]");

  let rca = document.getElementById("rca_" + id).value;
  let remark = document.getElementById("remark_" + id).value;

  tickets = tickets.map(t => {
    if(t.id === id) {
      t.status = "Closed";
      t.rootCause = rca;
      t.closingRemark = remark;
      t.closedBy = user.email;
      t.closedAt = new Date().toLocaleString();
    }
    return t;
  });

  localStorage.setItem("tickets", JSON.stringify(tickets));
  loadDashboard();
}

/* ================= DASHBOARD ================= */
function loadDashboard() {

  let currentUser = JSON.parse(localStorage.getItem("currentUser") || "{}");
  let tickets = JSON.parse(localStorage.getItem("tickets") || "[]");

  let isAdmin = currentUser.role === "admin";

  let filtered = isAdmin
    ? tickets
    : tickets.filter(t => t.userId === currentUser.userId);

  total_count.innerText = filtered.length;
  open_count.innerText = filtered.filter(t => t.status === "Open").length;
  close_count.innerText = filtered.filter(t => t.status === "Closed").length;

  let html = "";

  filtered.forEach(t => {

    html += `
    <div style="background:#111827;padding:12px;margin:10px 0;border-radius:10px;text-align:left;">

      <b>Ticket:</b> ${t.id}<br>
      <b>User:</b> ${t.userId}<br>
      <b>Name:</b> ${t.name}<br>
      <b>Site:</b> ${t.siteName}<br>

      <b>Issue:</b> ${t.issue}<br>

      <b>Status:</b>
      <span style="color:${t.status==='Open'?'#00eaff':'#22c55e'}">${t.status}</span><br>

      ${t.status === "Closed" ? `
        <hr>
        <b>RCA:</b> ${t.rootCause}<br>
        <b>Remark:</b> ${t.closingRemark}<br>
        <b>Closed By:</b> ${t.closedBy}<br>
      ` : ""}

      ${isAdmin && t.status === "Open" ? `
        <hr>
        <input id="rca_${t.id}" placeholder="Root Cause">
        <input id="remark_${t.id}" placeholder="Closing Remark">
        <button onclick="closeTicket('${t.id}')">Close Ticket</button>
      ` : ""}

    </div>`;
  });

  ticket_list.innerHTML = html;
}

/* ================= GENERATE TICKET ================= */
function generateTicket() {

  let currentUser = JSON.parse(localStorage.getItem("currentUser"));

  let ticket = "TKT-" + Math.floor(Math.random()*999999);

  let finalService = service.value === "Other"
    ? other_service.value
    : service.value;

  let tickets = JSON.parse(localStorage.getItem("tickets") || "[]");

  tickets.push({
    id: ticket,
    userId: currentUser.userId,
    name: c_name.value,
    company: c_company.value,
    mobile: c_mobile.value,
    email: c_email.value,
    siteName: currentUser.siteName,
    siteAddress: currentUser.siteAddress,
    service: finalService,
    priority: priority_sel.value,
    issue: issue_desc.value,
    status: "Open",
    createdAt: new Date().toLocaleString()
  });

  localStorage.setItem("tickets", JSON.stringify(tickets));

  loadDashboard();

  let subject = encodeURIComponent("Ticket " + ticket);

  let body = encodeURIComponent(
    "Ticket: " + ticket + "\n" +
    "Name: " + c_name.value + "\n" +
    "Issue: " + issue_desc.value
  );

  window.location.href =
    "mailto:info@bytenexinnovation.in,engineers@bytenexinnovation.in" +
    "?subject=" + subject +
    "&body=" + body;
}

</script>

</head>

<body>

<h2>Bytenex Customer Portal</h2>

<!-- LOGIN -->
<div id="login_box" class="container">
  <input id="user_email" placeholder="USER ID / ADMIN EMAIL">
  <input id="user_pass" type="password">

  <button onclick="login()">Login</button>

  <span class="link" onclick="showRegister()">Create Account</span>
  <span class="link" onclick="forgotPassword()">Forgot Password</span>
</div>

<!-- REGISTER -->
<div id="register_box" class="container" style="display:none;">
  <input id="r_name" placeholder="Name">
  <input id="r_email" placeholder="Email">
  <input id="r_mobile" placeholder="Mobile">
  <input id="r_company" placeholder="Company">

  <input id="r_site_name" placeholder="Site Name">
  <textarea id="r_site_address" placeholder="Site Address"></textarea>

  <input id="r_pass" type="password">

  <button onclick="register()">Create Account</button>
</div>

<!-- PORTAL -->
<div id="portal" class="container" style="display:none;">

  <div style="display:flex;justify-content:space-between;">
    <h3>Welcome, <span id="welcome_user"></span></h3>
    <button onclick="logout()" style="width:auto;background:red;">Logout</button>
  </div>

  <h4>My Site</h4>
  <div style="text-align:left;background:#111827;padding:10px;">
    <b>Name:</b> <span id="site_name"></span><br>
    <b>Address:</b> <span id="site_address"></span>
  </div>

  <hr>

  <div style="display:flex;justify-content:space-between;">
    <div>Total <span id="total_count">0</span></div>
    <div>Open <span id="open_count">0</span></div>
    <div>Closed <span id="close_count">0</span></div>
  </div>

  <div id="ticket_list"></div>

  <hr>

  <!-- FORM -->
  <input id="c_name" placeholder="Name">
  <input id="c_company" placeholder="Company">
  <input id="c_mobile" placeholder="Mobile">
  <input id="c_email" placeholder="Email">

  <select id="service" onchange="toggleOtherField()">
    <option>Repair</option>
    <option>Replacement</option>
    <option>Installation</option>
    <option>Other</option>
  </select>

  <div id="other_box" style="display:none;">
    <textarea id="other_service"></textarea>
  </div>

  <select id="type_sel">
    <option>AMC</option>
    <option>NONAMC</option>
  </select>

  <input id="contract_no">

  <select id="priority_sel">
    <option>Low</option>
    <option>Medium</option>
    <option>High</option>
    <option>Critical</option>
  </select>

  <textarea id="issue_desc"></textarea>

  <button onclick="generateTicket()">Submit</button>

</div>

</body>
</html>
