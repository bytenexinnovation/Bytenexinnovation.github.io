<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Bytenex Customer Portal</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>

body{
  margin:0;
  font-family:'Segoe UI',sans-serif;
  background:#f4f8fb;
  position:relative;
}

/* BACKGROUND ICONS */
body::before{
  content:"\f085 \f1eb \f0ad \f233 \f108 \f7c0 \f0e8";
  font-family:"Font Awesome 6 Free";
  font-weight:900;
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  font-size:140px;
  color:rgba(0,0,0,0.03);
  display:flex;
  flex-wrap:wrap;
  justify-content:space-around;
  align-items:center;
  pointer-events:none;
}

/* HEADER */
.header{
  text-align:center;
  padding:20px;
  font-size:26px;
  font-weight:bold;
  color:#0d6efd;
}

.slogan{
  text-align:center;
  color:#555;
  font-size:14px;
  margin-top:-10px;
}

/* CONTAINER */
.container{
  width:400px;
  max-width:90%;
  margin:30px auto;
  background:white;
  padding:25px;
  border-radius:15px;
  box-shadow:0 5px 20px rgba(0,0,0,0.1);
  position:relative;
  z-index:1;
}

/* INPUT */
.input-group{position:relative;}

.input-group i{
  position:absolute;
  top:50%;
  left:12px;
  transform:translateY(-50%);
  color:#888;
}

input,select,textarea{
  width:100%;
  padding:12px 12px 12px 38px;
  margin:10px 0;
  border-radius:8px;
  border:1px solid #ccc;
  box-sizing:border-box;
}

/* BUTTON */
button{
  width:100%;
  padding:12px;
  background:#0d6efd;
  color:white;
  border:none;
  border-radius:8px;
  cursor:pointer;
}

/* LINKS */
.link{text-align:center;color:#0d6efd;cursor:pointer;}

/* DASHBOARD */
.dashboard{
  display:none;
  padding:20px;
  position:relative;
  z-index:1;
}

/* TOPBAR */
.topbar{
  display:flex;
  justify-content:space-between;
  align-items:center;
}

/* CARD */
.card{
  background:white;
  padding:12px;
  border-radius:10px;
  margin-bottom:10px;
  box-shadow:0 3px 10px rgba(0,0,0,0.08);
}

/* TICKET */
.ticket{
  background:white;
  padding:12px;
  margin:10px 0;
  border-radius:10px;
  box-shadow:0 3px 10px rgba(0,0,0,0.08);
}

/* FOOTER */
footer{
  text-align:center;
  color:#555;
  margin-top:20px;
}

/* MODAL */
#profileModal{
  display:none;
  position:fixed;
  top:0;left:0;
  width:100%;height:100%;
  background:rgba(0,0,0,0.4);
  z-index:999;
}

.modal-box{
  background:white;
  width:350px;
  max-width:90%;
  margin:120px auto;
  padding:20px;
  border-radius:12px;
}

.small-btn{
  background:#28a745;
  width:auto;
  padding:6px 10px;
  font-size:12px;
  border-radius:6px;
}

/* LOGOUT ICON */
.logout-btn{
  background:#28a745;
  width:auto;
  padding:6px 10px;
  font-size:12px;
  border-radius:6px;
}

</style>
</head>

<body>

<div class="header">Bytenex Customer Portal</div>
<div class="slogan">Empowering Smart Infrastructure & Seamless Support</div>

<!-- LOGIN -->
<div class="container" id="loginPage">

<h3><i class="fa fa-lock"></i> Login</h3>

<input id="loginId" placeholder="User ID / Email">
<input id="loginPass" type="password" placeholder="Password">

<button onclick="login()">Login</button>

<div class="link" onclick="showCreate()">Create Account</div>
<div class="link" onclick="showForgot()">Forgot Password</div>

</div>

<!-- CREATE -->
<div class="container" id="createPage" style="display:none">

<h3>Create Account</h3>

<input id="name" placeholder="Name">
<input id="phone" placeholder="Phone">
<input id="org" placeholder="Organisation">
<input id="location" placeholder="Location">
<input id="email" placeholder="Email">
<input id="pass" type="password" placeholder="Password">
<input id="cpass" type="password" placeholder="Confirm Password">

<button onclick="createAccount()">Create Account</button>

</div>

<!-- FORGOT -->
<div class="container" id="forgotPage" style="display:none">

<h3>Reset Password</h3>

<input id="femail" placeholder="Email">
<input id="forg" placeholder="Organisation">

<button onclick="resetPass()">Reset Password</button>

</div>

<!-- DASHBOARD -->
<div class="dashboard" id="dashboard">

<div class="topbar">

<h2>Dashboard</h2>

<div>
<button class="small-btn" onclick="editProfile()">
<i class="fa fa-user-pen"></i> Edit
</button>

<button class="logout-btn" onclick="logout()">
<i class="fa fa-right-from-bracket"></i>
</button>
</div>

</div>

<div id="customerDetails"></div>

<h3>Tickets</h3>
<div id="ticketList"></div>

<!-- FORM -->
<div id="ticketForm">

<h3>New Service Request</h3>

<input id="reqName" placeholder="Requester Name">
<input id="pono" placeholder="PO No">

<select id="stype">
<option>AMC</option>
<option>NAMC</option>
<option>New Order</option>
<option>Other</option>
</select>

<select id="scat">
<option>Installation</option>
<option>R&M</option>
<option>Periodic Service</option>
<option>Replacement</option>
<option>Other</option>
</select>

<input id="issueLoc" placeholder="Location">

<textarea id="desc" placeholder="Minimum 2 lines description"></textarea>

<button onclick="submitTicket()">Submit</button>

</div>

</div>

<footer>© Bytenex Innovation</footer>

<!-- MODAL -->
<div id="profileModal">
<div class="modal-box">

<h3>Edit Profile</h3>

<input id="editName">
<input id="editOrg">
<input id="editLoc">

<button onclick="saveProfile()">Save</button>
<button onclick="closeModal()" style="background:#dc3545;margin-top:10px;">Cancel</button>

</div>
</div>

<script>

/* LOGIN */
let currentUser=null;
let role="customer";

function login(){

  let id=document.getElementById("loginId").value;
  let pass=document.getElementById("loginPass").value;

  let users=JSON.parse(localStorage.getItem("users")||"[]");

  if(id==="info@bytenexinnovation.in" && pass==="Asktoyash@1997"){
    role="admin"; currentUser="admin";
  }
  else if(id==="engineers@bytenexinnovation.in" && pass==="ByteAdmin@123"){
    role="engineer"; currentUser="engineer";
  }
  else{
    let u=users.find(x=>x.userid===id && x.pass===pass);
    if(!u){alert("Invalid login");return;}
    currentUser=u.userid;
    role="customer";
    localStorage.setItem("currentUserData",JSON.stringify(u));
  }

  loginPage.style.display="none";
  dashboard.style.display="block";

  if(role!=="customer") ticketForm.style.display="none";

  loadCustomerDetails();
  loadTickets();
}

/* CREATE ACCOUNT FIXED */
function createAccount(){

  let n=document.getElementById("name").value;
  let p=document.getElementById("phone").value;
  let o=document.getElementById("org").value;
  let l=document.getElementById("location").value;
  let e=document.getElementById("email").value;
  let pw=document.getElementById("pass").value;
  let cp=document.getElementById("cpass").value;

  if(!n||!p||!o||!l||!e||!pw||!cp){
    alert("All fields required");return;
  }

  if(pw!==cp){
    alert("Password mismatch");return;
  }

  let uid="BYTIN01A-"+Math.floor(Math.random()*9999)+"Z"+Math.floor(Math.random()*99999);

  let users=JSON.parse(localStorage.getItem("users")||"[]");

  users.push({name:n,phone:p,org:o,location:l,email:e,pass:pw,userid:uid});

  localStorage.setItem("users",JSON.stringify(users));

  alert("Account Created!\nUser ID: "+uid);

  createPage.style.display="none";
  loginPage.style.display="block";
}

/* PROFILE */
function loadCustomerDetails(){
  let u=JSON.parse(localStorage.getItem("currentUserData"));
  if(!u) return;

  customerDetails.innerHTML=`
  <div class="card">
  <b>Welcome, ${u.name}</b><br>
  Organisation: ${u.org}<br>
  Location: ${u.location}
  </div>`;
}

/* EDIT PROFILE */
function editProfile(){

  let u=JSON.parse(localStorage.getItem("currentUserData"));

  editName.value=u.name;
  editOrg.value=u.org;
  editLoc.value=u.location;

  profileModal.style.display="block";
}

function saveProfile(){

  let u=JSON.parse(localStorage.getItem("currentUserData"));

  u.name=editName.value;
  u.org=editOrg.value;
  u.location=editLoc.value;

  localStorage.setItem("currentUserData",JSON.stringify(u));

  let users=JSON.parse(localStorage.getItem("users")||"[]");

  let i=users.findIndex(x=>x.userid===u.userid);

  if(i!==-1){
    users[i]=u;
    localStorage.setItem("users",JSON.stringify(users));
  }

  profileModal.style.display="none";
  loadCustomerDetails();

  alert("Updated");
}

function closeModal(){
  profileModal.style.display="none";
}

/* LOGOUT */
function logout(){location.reload();}

/* TICKETS */
function loadTickets(){
  let t=JSON.parse(localStorage.getItem("tickets")||"[]");

  ticketList.innerHTML="";

  t.forEach((x,i)=>{

    let btn="";

    if(role==="admin" && x.status==="Open"){
      btn=`<button onclick="closeTicket(${i})" style="background:#dc3545;margin-top:8px;">Close</button>`;
    }

    ticketList.innerHTML+=`
    <div class="ticket">
    <b>${x.ticket}</b><br>
    ${x.name}<br>
    ${x.pono}<br>
    ${x.status}<br>
    ${x.desc}<br>
    ${btn}
    </div>`;
  });
}

function closeTicket(i){
  let t=JSON.parse(localStorage.getItem("tickets"));
  t[i].status="Closed";
  localStorage.setItem("tickets",JSON.stringify(t));
  loadTickets();
}

/* NAV */
function showCreate(){loginPage.style.display="none";createPage.style.display="block";}
function showForgot(){loginPage.style.display="none";forgotPage.style.display="block";}

</script>

</body>
</html>
