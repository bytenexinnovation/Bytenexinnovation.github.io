<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bytenex Customer Portal</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%); min-height: 100vh; }

        .container { max-width: 500px; margin: 50px auto; padding: 20px; }
        .login-card, .form-card { background: white; border-radius: 15px; box-shadow: 0 15px 35px rgba(0,0,0,0.1); padding: 30px; }

        .logo { text-align: center; margin-bottom: 20px; }
        .logo h1 { color: #2563eb; font-size: 28px; margin-bottom: 10px; }
        .logo i { font-size: 50px; color: #3b82f6; }

        .slogan { 
            background: linear-gradient(135deg, #10b981, #059669); 
            color: white; padding: 15px 25px; border-radius: 12px; 
            margin-bottom: 25px; text-align: center; 
            box-shadow: 0 8px 25px rgba(16,185,129,0.3);
            font-size: 16px; font-weight: 500;
        }
        .slogan i { font-size: 24px; margin-right: 10px; }

        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; color: #374151; font-weight: 500; }
        input, select, textarea { width: 100%; padding: 12px 15px; border: 2px solid #e5e7eb; border-radius: 10px; font-size: 16px; transition: all 0.3s; }
        input:focus, select:focus, textarea:focus { outline: none; border-color: #2563eb; box-shadow: 0 0 0 3px rgba(37,99,235,0.1); }

        .btn { width: 100%; padding: 14px; background: linear-gradient(135deg, #2563eb, #1d4ed8); color: white; border: none; border-radius: 10px; font-size: 16px; font-weight: 600; cursor: pointer; transition: all 0.3s; }
        .btn:hover { transform: translateY(-2px); box-shadow: 0 10px 25px rgba(37,99,235,0.3); }
        .btn:disabled { background: #9ca3af; cursor: not-allowed; transform: none; }

        .links { text-align: center; margin-top: 20px; }
        .links a { color: #2563eb; text-decoration: none; font-weight: 500; }

        .dashboard { max-width: 1000px; margin: 20px auto; padding: 20px; }
        .header { background: white; padding: 20px; border-radius: 15px; margin-bottom: 20px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 5px 15px rgba(0,0,0,0.08); }
        .header h2 { color: #1f2937; }
        .logout-btn { background: #ef4444; padding: 10px 20px; border-radius: 8px; color: white; text-decoration: none; }

        .tickets-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(350px, 1fr)); gap: 20px; margin-top: 20px; }
        .ticket-card { background: white; border-radius: 15px; padding: 20px; box-shadow: 0 5px 15px rgba(0,0,0,0.08); }
        .ticket-id { font-size: 24px; font-weight: bold; color: #2563eb; margin-bottom: 10px; }
        .status-open { color: #f59e0b; font-weight: bold; }
        .status-closed { color: #10b981; font-weight: bold; }

        .close-form { margin-top: 15px; }
        .close-form input, .close-form textarea { margin-bottom: 10px; }
        .close-form .btn { width: auto; padding: 8px 16px; font-size: 14px; }

        .alert { position: fixed; top: 20px; right: 20px; padding: 15px 20px; border-radius: 10px; color: white; font-weight: 500; z-index: 1000; transform: translateX(400px); transition: all 0.3s; }
        .alert-success { background: #10b981; }
        .alert-error { background: #ef4444; }
        .alert.show { transform: translateX(0); }

        .hidden { display: none !important; }
        footer { text-align: center; margin-top: 40px; color: #6b7280; font-size: 14px; padding-bottom: 20px; }
    </style>
</head>
<body>

<div id="loginPage" class="container">
    <div class="login-card">
        <div class="logo">
            <i class="fas fa-cogs"></i>
            <h1>Bytenex Customer Portal</h1>
        </div>
        <div class="slogan">
            <i class="fas fa-headset"></i>
            Engineer Support - 24x7 Available | Fast Resolution Guaranteed!
        </div>
        <form id="loginForm">
            <div class="form-group">
                <label><i class="fas fa-user"></i> User ID / Email</label>
                <input type="text" id="loginId" required>
            </div>
            <div class="form-group">
                <label><i class="fas fa-lock"></i> Password</label>
                <input type="password" id="loginPass" required>
            </div>
            <button type="submit" class="btn"><i class="fas fa-sign-in-alt"></i> Login</button>
        </form>
        <div class="links">
            <a href="#" onclick="showPage('create')"><i class="fas fa-user-plus"></i> Create Account</a> | 
            <a href="#" onclick="showPage('forget')"><i class="fas fa-key"></i> Forget Password</a>
        </div>
    </div>
</div>

<div id="createPage" class="container hidden">
    <div class="form-card">
        <div class="logo"><h1>Create Account</h1></div>
        <form id="createForm">
            <div class="form-group"><label>Customer Name</label><input type="text" id="cName" required></div>
            <div class="form-group"><label>Organisation Name</label><input type="text" id="cOrg" required></div>
            <div class="form-group"><label>Phone</label><input type="tel" id="cPhone" required></div>
            <div class="form-group"><label>Email</label><input type="email" id="cEmail" required></div>
            <div class="form-group"><label>Site Address</label><textarea id="cSite" required></textarea></div>
            <div class="form-group">
                <label>Customer Type</label>
                <select id="cType" required>
                    <option value="">Select</option>
                    <option value="AMC">AMC</option>
                    <option value="Non-AMC">Non AMC</option>
                </select>
            </div>
            <div class="form-group"><label>Password</label><input type="password" id="cPass" required></div>
            <div class="form-group"><label>Confirm Password</label><input type="password" id="cConfirm" required></div>
            <button type="submit" class="btn">Create Account</button>
            <button type="button" class="btn" onclick="showPage('login')" style="background: #6b7280; margin-top: 10px;">Back</button>
        </form>
    </div>
</div>

<div id="forgetPage" class="container hidden">
    <div class="form-card">
        <div class="logo"><h1>Reset Password</h1></div>
        <form id="forgetForm">
            <div class="form-group"><label>Email</label><input type="email" id="fEmail" required></div>
            <div class="form-group"><label>Organisation Name</label><input type="text" id="fOrg" required></div>
            <button type="submit" class="btn">Reset Password</button>
            <button type="button" class="btn" onclick="showPage('login')" style="background: #6b7280; margin-top: 10px;">Back</button>
        </form>
    </div>
</div>

<div id="customerDash" class="dashboard hidden">
    <div class="header">
        <div>
            <h2>Welcome <span id="userName"></span></h2>
            <p>Live Date: <span id="liveDate"></span> | Site: <span id="userSite"></span></p>
        </div>
        <a href="#" class="logout-btn" onclick="logout()">Logout</a>
    </div>
    <div class="tickets-grid">
        <div class="ticket-card">
            <h3>Raise New Ticket</h3>
            <form id="ticketForm">
                <div class="form-group"><label>Requester Name</label><input type="text" id="reqName" required></div>
                <div class="form-group"><label>PO/WO No</label><input type="text" id="poNo" required></div>
                <div class="form-group">
                    <label>Service Type</label>
                    <select id="serviceType" required onchange="toggleOtherService()">
                        <option value="AMC">AMC</option>
                        <option value="Non-AMC">Non-AMC</option>
                        <option value="Other">Other</option>
                    </select>
                    <input type="text" id="otherService" class="hidden" placeholder="Details">
                </div>
                <div class="form-group"><label>Issue Location</label><input type="text" id="issueLoc" required></div>
                <div class="form-group">
                    <label>Description (Min 10 words)</label>
                    <textarea id="issueDesc" required rows="4"></textarea>
                    <small id="wordCount">0 words</small>
                </div>
                <button type="submit" class="btn" id="ticketBtn" disabled>Submit Ticket</button>
            </form>
        </div>
        <div class="ticket-card">
            <h3>My Tickets</h3>
            <div id="customerTickets"></div>
        </div>
    </div>
</div>

<div id="adminDash" class="dashboard hidden">
    <div class="header">
        <h2>Admin Panel</h2>
        <a href="#" class="logout-btn" onclick="logout()">Logout</a>
    </div>
    <div class="tickets-grid" id="adminTickets"></div>
</div>

<div id="alert" class="alert hidden"></div>
<footer>© 2026 Bytenex Innovation. All rights reserved.</footer>

<script>
let currentUser = null;
let allTickets = JSON.parse(localStorage.getItem('bytenexTickets')) || [];
const admins = ['info@bytenexinnovation.in', 'engineers@bytenexinnovation.in'];
const adminPass = { 'info@bytenexinnovation.in': 'Asktoyash@1997', 'engineers@bytenexinnovation.in': 'BytAdmin123' };

// --- CORE FIX: Function to hide everything before showing a new page ---
function hideAll() {
    document.getElementById('loginPage').classList.add('hidden');
    document.getElementById('createPage').classList.add('hidden');
    document.getElementById('forgetPage').classList.add('hidden');
    document.getElementById('customerDash').classList.add('hidden');
    document.getElementById('adminDash').classList.add('hidden');
}

function showPage(pageId) {
    hideAll();
    document.getElementById(pageId + (pageId.includes('Dash') ? '' : 'Page')).classList.remove('hidden');
}

// LOGIN LOGIC
document.getElementById('loginForm').addEventListener('submit', (e) => {
    e.preventDefault();
    const id = document.getElementById('loginId').value;
    const pass = document.getElementById('loginPass').value;

    if (admins.includes(id) && adminPass[id] === pass) {
        currentUser = { type: 'admin', id, name: id };
        hideAll();
        updateAdminTickets();
        document.getElementById('adminDash').classList.remove('hidden');
        return;
    }

    const users = JSON.parse(localStorage.getItem('bytenexUsers')) || [];
    const user = users.find(u => u.userId === id || u.email === id);
    if (user && user.password === pass) {
        currentUser = user;
        hideAll();
        showCustomerDash();
    } else {
        showAlert('❌ Invalid credentials!', 'error');
    }
});

function showCustomerDash() {
    document.getElementById('userName').textContent = currentUser.name;
    document.getElementById('userSite').textContent = currentUser.site;
    document.getElementById('liveDate').textContent = new Date().toLocaleDateString();
    document.getElementById('customerDash').classList.remove('hidden');
    updateCustomerTickets();
}

function logout() {
    currentUser = null;
    hideAll();
    document.getElementById('loginPage').classList.remove('hidden');
}

// REST OF THE FUNCTIONS (Ticket creation, Account creation etc.)
document.getElementById('createForm').addEventListener('submit', (e) => {
    e.preventDefault();
    const userId = 'BYTI' + Math.floor(100000 + Math.random() * 900000) + 'Z';
    const user = {
        userId, name: document.getElementById('cName').value,
        org: document.getElementById('cOrg').value, phone: document.getElementById('cPhone').value,
        email: document.getElementById('cEmail').value, site: document.getElementById('cSite').value,
        type: document.getElementById('cType').value, password: document.getElementById('cPass').value
    };
    const users = JSON.parse(localStorage.getItem('bytenexUsers')) || [];
    users.push(user);
    localStorage.setItem('bytenexUsers', JSON.stringify(users));
    alert('Account Created! ID: ' + userId);
    showPage('login');
});

document.getElementById('issueDesc').addEventListener('input', function() {
    const words = this.value.trim().split(/\s+/).filter(w => w.length > 0).length;
    document.getElementById('wordCount').textContent = words + ' words';
    document.getElementById('ticketBtn').disabled = words < 10;
});

function showAlert(msg, type) {
    const a = document.getElementById('alert');
    a.textContent = msg; a.className = `alert alert-${type} show`;
    setTimeout(() => a.classList.remove('show'), 3000);
}

function updateCustomerTickets() {
    const userTickets = allTickets.filter(t => t.userId === currentUser.userId);
    document.getElementById('customerTickets').innerHTML = userTickets.map(t => `
        <div class="ticket-card" style="margin-bottom:10px; border-left: 5px solid ${t.status === 'Open' ? '#f59e0b' : '#10b981'}">
            <strong>${t.id}</strong> [${t.status}]<br><small>${t.date}</small>
        </div>
    `).join('') || 'No tickets.';
}

function updateAdminTickets() {
    document.getElementById('adminTickets').innerHTML = allTickets.map(t => `
        <div class="ticket-card">
            <div class="ticket-id">${t.id}</div>
            <p><strong>Site:</strong> ${t.site}</p>
            <p><strong>Status:</strong> ${t.status}</p>
            ${t.status === 'Open' ? `<button onclick="closeTicket('${t.id}')" class="btn" style="padding:5px; font-size:12px">Mark Closed</button>` : ''}
        </div>
    `).join('');
}

function closeTicket(id) {
    const t = allTickets.find(x => x.id === id);
    if(t) { t.status = 'Closed'; localStorage.setItem('bytenexTickets', JSON.stringify(allTickets)); updateAdminTickets(); }
}
</script>
</body>
</html>
