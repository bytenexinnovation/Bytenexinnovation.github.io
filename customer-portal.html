<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Bytenex Customer Portal</title>

<style>
body {
  font-family: Arial;
  margin: 0;
  background: #f4f6f9;
}

.container {
  width: 400px;
  margin: 50px auto;
  background: white;
  padding: 20px;
  border-radius: 10px;
}

input, select, textarea {
  width: 100%;
  margin: 8px 0;
  padding: 10px;
}

button {
  width: 100%;
  padding: 10px;
  background: #007bff;
  color: white;
  border: none;
  cursor: pointer;
}

.dashboard {
  display: none;
  padding: 20px;
}

.ticket {
  background: white;
  padding: 10px;
  margin: 10px 0;
  border-radius: 8px;
}

footer {
  text-align: center;
  margin-top: 20px;
}
</style>

</head>

<body>

<!-- LOGIN -->
<div class="container" id="loginPage">
<h2>Login</h2>
<input id="loginId" placeholder="User ID / Admin Email">
<input id="loginPass" type="password" placeholder="Password">

<button onclick="login()">Login</button>

<p onclick="showCreate()">Create Account</p>
<p onclick="showForgot()">Forgot Password</p>
</div>

<!-- CREATE ACCOUNT -->
<div class="container" id="createPage" style="display:none">
<h2>Create Account</h2>

<input id="name" placeholder="Name">
<input id="phone" placeholder="Phone">
<input id="org" placeholder="Organisation">
<input id="location" placeholder="Location">
<input id="email" placeholder="Email">
<input id="pass" type="password" placeholder="Password">
<input id="cpass" type="password" placeholder="Confirm Password">

<button onclick="createAccount()">Create</button>
</div>

<!-- FORGOT -->
<div class="container" id="forgotPage" style="display:none">
<h2>Reset Password</h2>

<input id="femail" placeholder="Email">
<input id="forg" placeholder="Organisation">

<button onclick="resetPass()">Reset</button>
</div>

<!-- DASHBOARD -->
<div class="dashboard" id="dashboard">
<h2>Dashboard</h2>

<h3>Tickets</h3>
<div id="ticketList"></div>

<h3>New Service Request</h3>

<input id="reqName" placeholder="Requester Name">
<input id="pono" placeholder="PO No">

<select id="stype" onchange="showOther('stype','stypeOther')">
<option>AMC</option>
<option>NAMC</option>
<option>New Order</option>
<option>Other</option>
</select>
<input id="stypeOther" style="display:none" placeholder="Describe">

<select id="scat" onchange="showOther('scat','scatOther')">
<option>Installation</option>
<option>R&M</option>
<option>Periodic Service</option>
<option>Replacement</option>
<option>Other</option>
</select>
<input id="scatOther" style="display:none" placeholder="Describe">

<input id="issueLoc" placeholder="Location">

<textarea id="desc" placeholder="Describe issue (min 10 lines)"></textarea>

<button onclick="submitTicket()">Submit</button>

</div>

<footer>© Bytenex Innovation</footer>

<script>
let currentUser = null;

// LOGIN
function login() {
  let id = document.getElementById("loginId").value;
  let pass = document.getElementById("loginPass").value;

  if(id === "info@bytenexinnovation.in" && pass==="Asktoyash@1997"){
    currentUser = "admin";
  }
  else if(id === "engineers@bytenexinnovation.in" && pass==="ByteAdmin@123"){
    currentUser = "engineer";
  }
  else {
    let users = JSON.parse(localStorage.getItem("users")||"[]");
    let user = users.find(u=>u.userid===id && u.pass===pass);
    if(!user){
      alert("Invalid login");
      return;
    }
    currentUser = user.userid;
  }

  document.getElementById("loginPage").style.display="none";
  document.getElementById("dashboard").style.display="block";
  loadTickets();
}

// CREATE ACCOUNT
function createAccount(){
  let uid = "BYTIN01A-"+Math.floor(Math.random()*9999)+"Z"+Math.floor(Math.random()*99999);

  let users = JSON.parse(localStorage.getItem("users")||"[]");

  users.push({
    name: name.value,
    phone: phone.value,
    org: org.value,
    location: location.value,
    email: email.value,
    pass: pass.value,
    userid: uid
  });

  localStorage.setItem("users",JSON.stringify(users));
  alert("User ID: "+uid);
  location.reload();
}

// FORGOT
function resetPass(){
  let users = JSON.parse(localStorage.getItem("users")||"[]");
  let u = users.find(x=>x.email===femail.value && x.org===forg.value);

  if(!u){
    alert("Mismatch");
    return;
  }

  let newPass = Math.random().toString(36).slice(-8);
  u.pass = newPass;
  localStorage.setItem("users",JSON.stringify(users));

  alert("New Password: "+newPass);
}

// SHOW OTHER
function showOther(sel,field){
  let val = document.getElementById(sel).value;
  document.getElementById(field).style.display = val==="Other" ? "block":"none";
}

// SUBMIT TICKET
function submitTicket(){
  let desc = document.getElementById("desc").value;

  if(desc.split("\n").length < 10){
    alert("Minimum 10 lines required");
    return;
  }

  let tickets = JSON.parse(localStorage.getItem("tickets")||"[]");

  let ticketNo = "BYT/"+pono.value+"/"+Math.floor(Math.random()*900000000);

  tickets.push({
    user: currentUser,
    ticket: ticketNo,
    status: "Open",
    desc: desc
  });

  localStorage.setItem("tickets",JSON.stringify(tickets));

  alert("Ticket Created: "+ticketNo);
  loadTickets();
}

// LOAD TICKETS
function loadTickets(){
  let tickets = JSON.parse(localStorage.getItem("tickets")||"[]");
  let div = document.getElementById("ticketList");
  div.innerHTML="";

  tickets.forEach(t=>{
    if(currentUser==="admin" || t.user===currentUser){
      div.innerHTML += `<div class="ticket">
      ${t.ticket} - ${t.status}
      </div>`;
    }
  });
}

// NAVIGATION
function showCreate(){
  loginPage.style.display="none";
  createPage.style.display="block";
}
function showForgot(){
  loginPage.style.display="none";
  forgotPage.style.display="block";
}
</script>

</body>
</html>
