<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Customer Portal - Bytenex</title>

<style>
body {
  font-family: Arial;
  background: #0b0f1a;
  color: white;
  text-align: center;
  padding: 20px;
}

.container {
  max-width: 500px;
  margin: auto;
  background: #111827;
  padding: 20px;
  border-radius: 10px;
}

input, select {
  width: 100%;
  padding: 10px;
  margin: 8px 0;
  border-radius: 5px;
  border: none;
}

button {
  padding: 10px 20px;
  background: #00eaff;
  border: none;
  border-radius: 20px;
  cursor: pointer;
  margin-top: 10px;
}

.ticket {
  margin-top: 20px;
  font-size: 18px;
  color: #00eaff;
}
</style>

<script>
// REGISTER USER
function register() {
  let userData = {
    name: document.getElementById("r_name").value,
    email: document.getElementById("r_email").value,
    mobile: document.getElementById("r_mobile").value,
    location: document.getElementById("r_location").value,
    company: document.getElementById("r_company").value,
    password: document.getElementById("r_pass").value
  };

  localStorage.setItem(userData.email, JSON.stringify(userData));

  alert("Account Created Successfully!");
  document.getElementById("register-box").style.display = "none";
  document.getElementById("login-box").style.display = "block";
}

// LOGIN USER
function login() {
  let email = document.getElementById("user").value;
  let pass = document.getElementById("pass").value;

  let storedUser = JSON.parse(localStorage.getItem(email));

  if(storedUser && storedUser.password === pass) {
    document.getElementById("login-box").style.display = "none";
    document.getElementById("portal").style.display = "block";
  } else {
    alert("Invalid Login");
  }
}

// GENERATE TICKET
function generateTicket() {
  let type = document.getElementById("type").value;
  let service = document.getElementById("service").value;

  let random = Math.floor(Math.random() * 9999999);
  let ticket = type + "/" + service + "/" + random;

  document.getElementById("ticket").innerText = "Ticket No: " + ticket;
}

// SWITCH FORMS
function showRegister() {
  document.getElementById("login-box").style.display = "none";
  document.getElementById("register-box").style.display = "block";
}

function showLogin() {
  document.getElementById("register-box").style.display = "none";
  document.getElementById("login-box").style.display = "block";
}
</script>

</head>

<body>

<h2>Customer Portal</h2>

<!-- LOGIN -->
<div id="login-box" class="container">
  <h3>Login</h3>
  <input type="text" id="user" placeholder="Email ID">
  <input type="password" id="pass" placeholder="Password">
  <button onclick="login()">Login</button>
  <p>Don't have account? <span onclick="showRegister()" style="color:#00eaff; cursor:pointer;">Create Account</span></p>
</div>

<!-- REGISTER -->
<div id="register-box" class="container" style="display:none;">
  <h3>Create Account</h3>

  <input type="text" id="r_name" placeholder="Full Name">
  <input type="email" id="r_email" placeholder="Company Email ID">
  <input type="text" id="r_mobile" placeholder="Mobile Number">
  <input type="text" id="r_location" placeholder="Location">
  <input type="text" id="r_company" placeholder="Company Name">
  <input type="password" id="r_pass" placeholder="Create Password">

  <button onclick="register()">Create Account</button>
  <p>Already have account? <span onclick="showLogin()" style="color:#00eaff; cursor:pointer;">Login</span></p>
</div>

<!-- PORTAL -->
<div id="portal" class="container" style="display:none;">
  <h3>Raise Service Request</h3>

  <input type="text" placeholder="Customer Name">
  <input type="text" placeholder="Company Name">
  <input type="text" placeholder="Mobile Number">

  <select id="type">
    <option value="AMC">AMC</option>
    <option value="NONAMC">NON AMC</option>
  </select>

  <select id="service">
    <option value="BI">BI</option>
    <option value="SERVICE">SERVICE</option>
  </select>

  <button onclick="generateTicket()">Generate Ticket</button>

  <div id="ticket" class="ticket"></div>
</div>

</body>
</html>
