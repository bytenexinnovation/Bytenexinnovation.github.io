<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Bytenex Customer Portal</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>
body{
  margin:0;
  font-family:'Segoe UI',sans-serif;
  background:#f4f8fb;
}

.header{
  text-align:center;
  padding:20px;
  font-size:26px;
  font-weight:bold;
  color:#0d6efd;
}

.container{
  width:400px;
  max-width:90%;
  margin:30px auto;
  background:white;
  padding:25px;
  border-radius:15px;
  box-shadow:0 5px 20px rgba(0,0,0,0.1);
}

input,select,textarea{
  width:100%;
  padding:12px;
  margin:10px 0;
  border-radius:8px;
  border:1px solid #ccc;
}

button{
  width:100%;
  padding:12px;
  background:#0d6efd;
  color:white;
  border:none;
  border-radius:8px;
  cursor:pointer;
}

.dashboard{
  display:none;
  padding:20px;
}

.ticket{
  background:white;
  padding:12px;
  margin:10px 0;
  border-radius:10px;
  box-shadow:0 3px 10px rgba(0,0,0,0.08);
}
</style>
</head>

<body>

<div class="header">Bytenex Customer Portal</div>

<!-- LOGIN -->
<div class="container" id="loginPage">
<h3>Login</h3>
<input id="loginId" placeholder="User ID / Email">
<input id="loginPass" type="password" placeholder="Password">
<button onclick="login()">Login</button>

<div onclick="showCreate()" style="cursor:pointer;color:blue;">Create Account</div>
<div onclick="showForgot()" style="cursor:pointer;color:blue;">Forgot Password</div>
</div>

<!-- CREATE -->
<div class="container" id="createPage" style="display:none">
<h3>Create Account</h3>
<input id="name" placeholder="Name">
<input id="phone" placeholder="Phone">
<input id="org" placeholder="Organisation">
<input id="location" placeholder="Location">
<input id="email" placeholder="Email">
<input id="pass" type="password" placeholder="Password">
<input id="cpass" type="password" placeholder="Confirm Password">
<button onclick="createAccount()">Create Account</button>
</div>

<!-- FORGOT -->
<div class="container" id="forgotPage" style="display:none">
<h3>Reset Password</h3>
<input id="femail" placeholder="Email">
<input id="forg" placeholder="Organisation">
<button onclick="resetPass()">Reset Password</button>
</div>

<!-- DASHBOARD -->
<div class="dashboard" id="dashboard">

<h2>Dashboard</h2>

<h3>New Ticket</h3>
<input id="reqName" placeholder="Requester Name">
<input id="pono" placeholder="PO No">

<select id="stype">
<option>AMC</option>
<option>NAMC</option>
<option>New Order</option>
</select>

<select id="scat">
<option>Installation</option>
<option>R&M</option>
<option>Service</option>
</select>

<input id="issueLoc" placeholder="Location">
<textarea id="desc" placeholder="Minimum 2 lines"></textarea>

<button onclick="submitTicket()">Submit</button>

<h3>Tickets</h3>
<div id="ticketList"></div>

<button onclick="logout()">Logout</button>

</div>

<script>

let currentUser=null;

/* LOGIN */
function login(){
let id=loginId.value;
let pass=loginPass.value;

let users=JSON.parse(localStorage.getItem("users")||"[]");

let u=users.find(x=>x.userid===id && x.pass===pass);

if(!u){ alert("Invalid Login"); return; }

currentUser=u;
localStorage.setItem("currentUserData",JSON.stringify(u));

loginPage.style.display="none";
dashboard.style.display="block";

loadTickets();
}

/* CREATE */
function createAccount(){

if(pass.value!==cpass.value){
alert("Password mismatch"); return;
}

let uid="BYT-"+Math.floor(Math.random()*99999);

let users=JSON.parse(localStorage.getItem("users")||"[]");

users.push({
name:name.value,
phone:phone.value,
org:org.value,
location:location.value,
email:email.value,
pass:pass.value,
userid:uid
});

localStorage.setItem("users",JSON.stringify(users));

alert("User ID: "+uid);

createPage.style.display="none";
loginPage.style.display="block";
}

/* RESET PASSWORD */
function resetPass(){

let email=femail.value;
let orgn=forg.value;

let users=JSON.parse(localStorage.getItem("users")||"[]");

let user=users.find(u=>u.email===email && u.org===orgn);

if(!user){ alert("User not found"); return; }

let newPass=prompt("Enter New Password");
if(!newPass){ return; }

user.pass=newPass;

localStorage.setItem("users",JSON.stringify(users));

alert("Password Reset Success");

forgotPage.style.display="none";
loginPage.style.display="block";
}

/* SUBMIT TICKET */
function submitTicket(){

let d=desc.value.trim();
let lines=d.split("\n").filter(x=>x.trim()!="");

if(lines.length<2){
alert("Minimum 2 lines required"); return;
}

let company=currentUser.org.replace(/\s+/g,'');
let series=Math.floor(Math.random()*999999)+1;

let ticketNo=company+"/"+pono.value+"/"+series;

let tickets=JSON.parse(localStorage.getItem("tickets")||"[]");

tickets.push({
ticket:ticketNo,
name:reqName.value,
desc:d
});

localStorage.setItem("tickets",JSON.stringify(tickets));

alert("Ticket Created: "+ticketNo);

loadTickets();

/* MAIL */
let subject="New Service Ticket";

let body=
`New Service Ticket Generated

Ticket No: ${ticketNo}
Company: ${company}
Requester: ${reqName.value}
PO No: ${pono.value}
Location: ${issueLoc.value}

Description:
${d}

Status: Open`;

window.location.href=
`mailto:info@bytenexinnovation.in,engineers@bytenexinnovation.in?subject=${encodeURIComponent(subject)}&body=${encodeURIComponent(body)}`;
}

/* LOAD */
function loadTickets(){

let tickets=JSON.parse(localStorage.getItem("tickets")||"[]");

ticketList.innerHTML="";

tickets.forEach(t=>{
ticketList.innerHTML+=`
<div class="ticket">
<b>${t.ticket}</b><br>
${t.name}<br>
${t.desc}
</div>`;
});
}

/* NAV */
function showCreate(){
loginPage.style.display="none";
createPage.style.display="block";
}

function showForgot(){
loginPage.style.display="none";
forgotPage.style.display="block";
}

function logout(){
location.reload();
}

</script>

</body>
</html>
