<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Bytenex Customer Portal</title>

<style>
body {
  font-family: 'Segoe UI', Arial;
  background: linear-gradient(135deg, #0b0f1a, #111827);
  color: white;
  text-align: center;
  padding: 20px;
}

.container {
  max-width: 650px;
  margin: auto;
  background: #1f2937;
  padding: 25px;
  border-radius: 12px;
  margin-bottom: 15px;
}

input, select, textarea {
  width: 100%;
  padding: 12px;
  margin: 8px 0;
  border-radius: 8px;
  border: none;
  background: #111827;
  color: white;
}

button {
  padding: 12px;
  width: 100%;
  background: #00eaff;
  border: none;
  border-radius: 25px;
  cursor: pointer;
  font-size: 15px;
}

.link {
  color: #00eaff;
  cursor: pointer;
}

.ticket {
  margin-top: 10px;
  color: #00eaff;
  font-weight: bold;
}

.footer {
  margin-top: 20px;
  font-size: 12px;
  color: #aaa;
}
</style>

<script>

/* ================= REGISTER ================= */
function register() {
  let user = {
    name: r_name.value,
    email: r_email.value,
    mobile: r_mobile.value,
    company: r_company.value,
    password: r_pass.value
  };

  localStorage.setItem(user.email, JSON.stringify(user));
  alert("Account Created!");
  showLogin();
}

/* ================= LOGIN ================= */
function login() {
  let data = JSON.parse(localStorage.getItem(user_email.value));

  if(data && data.password === user_pass.value) {
    login_box.style.display = "none";
    register_box.style.display = "none";
    portal.style.display = "block";

    c_name.value = data.name;
    c_company.value = data.company;
    c_mobile.value = data.mobile;
    c_email.value = data.email;

    loadDashboard();
  } else {
    alert("Invalid Login");
  }
}

/* ================= SWITCH ================= */
function showRegister(){
  login_box.style.display="none";
  register_box.style.display="block";
}

function showLogin(){
  register_box.style.display="none";
  login_box.style.display="block";
}

/* ================= SERVICE TOGGLE ================= */
function toggleOtherField() {
  let box = document.getElementById("other_box");
  box.style.display = (service.value === "Other") ? "block" : "none";
}

/* ================= LOAD DASHBOARD ================= */
function loadDashboard() {
  let tickets = JSON.parse(localStorage.getItem("tickets") || "[]");

  let total = tickets.length;
  let open = tickets.filter(t => t.status === "Open").length;
  let closed = tickets.filter(t => t.status === "Closed").length;

  total_count.innerText = total;
  open_count.innerText = open;
  close_count.innerText = closed;

  let html = "";

  tickets.forEach((t, index) => {
    html += `
      <div style="background:#111827; padding:10px; margin:8px 0; border-radius:10px; text-align:left;">
        <b>${t.id}</b><br>
        ${t.service} | ${t.priority}<br>
        Status: <b style="color:${t.status==='Open'?'#00eaff':'#22c55e'}">${t.status}</b><br>

        <button onclick="closeTicket(${index})"
          style="margin-top:8px; padding:8px; border-radius:8px;">
          Close Ticket
        </button>
      </div>
    `;
  });

  ticket_list.innerHTML = html;
}

/* ================= CLOSE TICKET (ADMIN ONLY) ================= */
function closeTicket(index) {

  let adminEmail = "info@bytenexinnovation.in";

  if(c_email.value !== adminEmail) {
    alert("Only admin can close tickets");
    return;
  }

  let tickets = JSON.parse(localStorage.getItem("tickets") || "[]");
  tickets[index].status = "Closed";

  localStorage.setItem("tickets", JSON.stringify(tickets));
  loadDashboard();
}

/* ================= GENERATE TICKET ================= */
function generateTicket() {

  let type = type_sel.value;
  let contract = contract_no.value;
  let serviceType = service.value;
  let other = other_service.value;
  let priority = priority_sel.value;
  let issue = issue_desc.value;

  if(type === "AMC" && contract.trim() === "") {
    alert("Contract Number required for AMC");
    return;
  }

  if(serviceType === "Other" && other.trim() === "") {
    alert("Please describe service");
    return;
  }

  let finalService = (serviceType === "Other") ? other : serviceType;

  let ticket = type + "-" + (contract || "NA") + "-" + Math.floor(Math.random()*999999);

  ticket_no.innerText = "Ticket No: " + ticket;

  /* SAVE TICKET */
  let tickets = JSON.parse(localStorage.getItem("tickets") || "[]");

  tickets.push({
    id: ticket,
    name: c_name.value,
    company: c_company.value,
    mobile: c_mobile.value,
    email: c_email.value,
    contract: contract,
    service: finalService,
    priority: priority,
    issue: issue,
    status: "Open",
    createdAt: new Date().toLocaleString()
  });

  localStorage.setItem("tickets", JSON.stringify(tickets));

  loadDashboard();

  /* MAIL */
  let subject = encodeURIComponent("Bytenex Ticket - " + ticket);

  let body = encodeURIComponent(
    "Name: " + c_name.value + "\n" +
    "Company: " + c_company.value + "\n" +
    "Mobile: " + c_mobile.value + "\n" +
    "Email: " + c_email.value + "\n\n" +
    "Service: " + finalService + "\n" +
    "Priority: " + priority + "\n\n" +
    "Issue:\n" + issue + "\n\n" +
    "Ticket: " + ticket
  );

  window.location.href =
  "mailto:engineers@bytenexinnovation.in,info@bytenexinnovation.in?subject=" +
  subject + "&body=" + body;
}

</script>

</head>

<body>

<h2>Bytenex Customer Portal</h2>

<!-- LOGIN -->
<div id="login_box" class="container">
  <input id="user_email" placeholder="Email">
  <input id="user_pass" type="password" placeholder="Password">
  <button onclick="login()">Login</button>
  <p class="link" onclick="showRegister()">Create Account</p>
</div>

<!-- REGISTER -->
<div id="register_box" class="container" style="display:none;">
  <input id="r_name" placeholder="Name">
  <input id="r_email" placeholder="Email">
  <input id="r_mobile" placeholder="Mobile">
  <input id="r_company" placeholder="Company">
  <input id="r_pass" type="password" placeholder="Password">
  <button onclick="register()">Create Account</button>
  <p class="link" onclick="showLogin()">Back to Login</p>
</div>

<!-- PORTAL -->
<div id="portal" class="container" style="display:none;">

  <h3>Raise Service Request</h3>

  <!-- DASHBOARD -->
  <div style="display:flex; justify-content:space-between; margin-bottom:15px;">
    <div>Total: <span id="total_count">0</span></div>
    <div>Open: <span id="open_count">0</span></div>
    <div>Closed: <span id="close_count">0</span></div>
  </div>

  <h3>My Tickets</h3>
  <div id="ticket_list"></div>

  <hr>

  <p style="font-size:14px; color:#9ca3af;">
  We're sorry to hear about your experience. Kindly share details below.
  </p>

  <input id="c_name" placeholder="Name">
  <input id="c_company" placeholder="Company">
  <input id="c_mobile" placeholder="Mobile">
  <input id="c_email" placeholder="Email">

  <select id="type_sel">
    <option value="AMC">AMC</option>
    <option value="NONAMC">NON AMC</option>
  </select>

  <input id="contract_no" placeholder="Contract Number">

  <select id="service" onchange="toggleOtherField()">
    <option value="Repair">Repair</option>
    <option value="Replacement">Replacement</option>
    <option value="Installation">Installation</option>
    <option value="Other">Other</option>
  </select>

  <div id="other_box" style="display:none;">
    <textarea id="other_service" placeholder="Describe service..."></textarea>
  </div>

  <select id="priority_sel">
    <option>Low</option>
    <option>Medium</option>
    <option>High</option>
    <option>Critical</option>
  </select>

  <textarea id="issue_desc" placeholder="Describe issue"></textarea>

  <button onclick="generateTicket()">Submit Request</button>

  <div id="ticket_no" class="ticket"></div>

</div>

<div class="footer">
© 2026 Bytenex Innovation. All Rights Reserved.
</div>

</body>
</html>
