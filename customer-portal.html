<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Bytenex Service Portal</title>

<style>
body {
  margin: 0;
  font-family: 'Segoe UI', Arial;
  background: linear-gradient(135deg, #0b0f1a, #111827);
  color: white;
}

.header {
  text-align: center;
  padding: 20px;
  font-size: 24px;
  font-weight: bold;
}

.container {
  max-width: 750px;
  margin: auto;
  background: #1f2937;
  padding: 25px;
  border-radius: 12px;
  box-shadow: 0 0 25px rgba(0,0,0,0.4);
}

.form-row {
  display: flex;
  gap: 10px;
}

input, select, textarea {
  width: 100%;
  padding: 12px;
  margin: 10px 0;
  border-radius: 8px;
  border: none;
  background: #111827;
  color: white;
}

input:focus, textarea:focus {
  border: 1px solid #00eaff;
}

button {
  width: 100%;
  padding: 14px;
  background: #00eaff;
  border: none;
  border-radius: 25px;
  font-size: 16px;
  cursor: pointer;
}

.ticket {
  margin-top: 15px;
  color: #00eaff;
  font-weight: bold;
}

.footer {
  text-align: center;
  margin-top: 20px;
  font-size: 12px;
  color: #aaa;
}
</style>

<script>

// Show/Hide "Other Service"
function toggleOtherField() {
  let service = document.getElementById("service").value;
  let box = document.getElementById("other_box");

  box.style.display = (service === "Other") ? "block" : "none";
}

// Generate Ticket
function generateTicket() {

  let type = document.getElementById("type").value;
  let contract = document.getElementById("contract").value;
  let service = document.getElementById("service").value;
  let other = document.getElementById("other_service").value;
  let priority = document.getElementById("priority").value;
  let issue = document.getElementById("issue").value;

  // Validation
  if(type === "AMC" && contract.trim() === "") {
    alert("Contract Number required for AMC");
    return;
  }

  if(service === "Other" && other.trim() === "") {
    alert("Please describe the service");
    return;
  }

  let finalService = (service === "Other") ? other : service;

  let random = Math.floor(Math.random() * 999999);
  let ticket = type + "-" + (contract || "NA") + "-" + random;

  document.getElementById("ticket").innerText = "Ticket No: " + ticket;

  let subject = encodeURIComponent("Bytenex Ticket - " + ticket);

  let body = encodeURIComponent(
    "Contract Type: " + type + "\n" +
    "Contract No: " + (contract || "NA") + "\n" +
    "Service: " + finalService + "\n" +
    "Priority: " + priority + "\n\n" +
    "Issue:\n" + issue + "\n\n" +
    "Ticket No: " + ticket
  );

  let mailto = "mailto:engineers@bytenexinnovation.in,info@bytenexinnovation.in"
              + "?subject=" + subject + "&body=" + body;

  window.location.href = mailto;
}

</script>

</head>

<body>

<div class="header">Bytenex Service Request Portal</div>

<div class="container">

  <!-- TYPE -->
  <select id="type">
    <option value="AMC">AMC</option>
    <option value="NONAMC">NON AMC</option>
  </select>

  <!-- CONTRACT -->
  <input id="contract" placeholder="Contract Number (Required for AMC)">

  <!-- SERVICE -->
  <select id="service" onchange="toggleOtherField()">
    <option value="Repair">Repair</option>
    <option value="Replacement">Replacement</option>
    <option value="Installation">Installation</option>
    <option value="Other">Other (Please Describe)</option>
  </select>

  <!-- OTHER FIELD -->
  <textarea id="other_service" placeholder="Describe service..." style="display:none;"></textarea>

  <!-- PRIORITY -->
  <select id="priority">
    <option value="Low">Low Priority</option>
    <option value="Medium">Medium Priority</option>
    <option value="High">High Priority</option>
    <option value="Critical">Critical</option>
  </select>

  <!-- ISSUE -->
  <textarea id="issue" rows="4" placeholder="Describe your issue clearly..."></textarea>

  <button onclick="generateTicket()">Submit Request</button>

  <div id="ticket" class="ticket"></div>

</div>

<div class="footer">
  © 2026 Bytenex Innovation. All Rights Reserved.
</div>

</body>
</html>
