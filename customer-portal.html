<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Bytenex Customer Portal</title>

<style>
body {
  font-family: 'Segoe UI', Arial;
  background: #f5f5f5;
  color: #333;
  text-align: center;
  padding: 20px;
}

.container {
  max-width: 700px;
  margin: auto;
  background: #fff;
  padding: 25px;
  border-radius: 12px;
  margin-bottom: 15px;
  border: 1px solid #eee;
  box-shadow: 0 5px 15px rgba(0,0,0,0.05);
}

input, select, textarea {
  width: 100%;
  padding: 12px;
  margin: 8px 0;
  border-radius: 8px;
  border: 1px solid #ddd;
}

button {
  padding: 12px;
  width: 100%;
  background: #00aaff;
  border: none;
  border-radius: 25px;
  cursor: pointer;
  color: #fff;
  font-weight: bold;
}

.link {
  color: #00aaff;
  cursor: pointer;
}

.ticket {
  background:#f9f9f9;
  padding:12px;
  margin:10px 0;
  border-radius:10px;
  text-align:left;
  border:1px solid #eee;
}
</style>

<script>

/* USER ID */
function generateUserId() {
  return "BNT" + Math.floor(Math.random()*999999);
}

/* REGISTER */
function register() {
  let id = generateUserId();

  let user = {
    userId: id,
    name: r_name.value,
    email: r_email.value,
    password: r_pass.value,
    role: "customer"
  };

  localStorage.setItem(id, JSON.stringify(user));
  alert("USER ID: " + id);
  showLogin();
}

/* LOGIN */
function login() {

  let input = user_email.value;
  let pass = user_pass.value;

  /* ADMIN */
  if(input === "info@bytenexinnovation.in") {
    localStorage.setItem("currentUser", JSON.stringify({
      role:"admin",
      email:input
    }));
    openPortal();
    return;
  }

  /* CUSTOMER */
  let user = JSON.parse(localStorage.getItem(input));

  if(user && user.password === pass) {
    localStorage.setItem("currentUser", JSON.stringify(user));
    openPortal();
  } else {
    alert("Invalid USER ID / Password");
  }
}

function openPortal(){
  login_box.style.display="none";
  register_box.style.display="none";
  portal.style.display="block";
  loadDashboard();
}

function logout(){
  localStorage.removeItem("currentUser");
  location.reload();
}

function showRegister(){ login_box.style.display="none"; register_box.style.display="block"; }
function showLogin(){ register_box.style.display="none"; login_box.style.display="block"; }

/* CREATE TICKET */
function generateTicket(){

  let currentUser = JSON.parse(localStorage.getItem("currentUser"));

  let ticket = "T-" + Math.floor(Math.random()*999999);

  let tickets = JSON.parse(localStorage.getItem("tickets") || "[]");

  tickets.push({
    id: ticket,
    userId: currentUser.userId,
    name: c_name.value,
    company: c_company.value,
    issue: issue_desc.value,
    status: "Open",
    createdAt: new Date().toLocaleString()
  });

  localStorage.setItem("tickets", JSON.stringify(tickets));

  ticket_no.innerText = "Ticket: " + ticket;

  loadDashboard();
}

/* CLOSE TICKET (ADMIN ONLY) */
function closeTicket(id){

  let currentUser = JSON.parse(localStorage.getItem("currentUser"));

  if(currentUser.role !== "admin") return;

  let tickets = JSON.parse(localStorage.getItem("tickets"));

  tickets = tickets.map(t=>{
    if(t.id === id){
      t.status = "Closed";
      t.closedAt = new Date().toLocaleString();
      t.closedBy = currentUser.email;
    }
    return t;
  });

  localStorage.setItem("tickets", JSON.stringify(tickets));
  loadDashboard();
}

/* DASHBOARD */
function loadDashboard(){

  let currentUser = JSON.parse(localStorage.getItem("currentUser"));
  let tickets = JSON.parse(localStorage.getItem("tickets") || "[]");

  let html = "";

  tickets.forEach(t=>{

    /* FILTER */
    if(currentUser.role !== "admin" && t.userId !== currentUser.userId){
      return;
    }

    html += `
    <div class="ticket">
      <b>${t.id}</b><br>
      User: ${t.userId}<br>
      ${t.name} - ${t.company}<br>
      Issue: ${t.issue}<br>
      Status: ${t.status}<br>
      Created: ${t.createdAt}<br>

      ${t.status==="Closed" ? `
        Closed By: ${t.closedBy}<br>
        Closed At: ${t.closedAt}<br>
      ` : ""}

      ${currentUser.role==="admin" && t.status==="Open" ? `
        <button onclick="closeTicket('${t.id}')" style="background:#22c55e;margin-top:5px;">
          Close Ticket
        </button>
      ` : ""}
    </div>
    `;
  });

  ticket_list.innerHTML = html;
}

</script>
</head>

<body>

<h2 style="color:#0077aa;">Bytenex Customer Portal</h2>

<div id="login_box" class="container">
  <input id="user_email" placeholder="USER ID / Admin Email">
  <input id="user_pass" type="password" placeholder="Password">
  <button onclick="login()">Login</button>
  <br><br>
  <span class="link" onclick="showRegister()">Create Account</span>
</div>

<div id="register_box" class="container" style="display:none;">
  <input id="r_name" placeholder="Name">
  <input id="r_email" placeholder="Email">
  <input id="r_pass" type="password" placeholder="Password">
  <button onclick="register()">Create Account</button>
</div>

<div id="portal" class="container" style="display:none;">

<h3>🛠 Register Complaint</h3>

<input id="c_name" placeholder="Name">
<input id="c_company" placeholder="Company">
<textarea id="issue_desc" placeholder="Issue"></textarea>

<button onclick="generateTicket()">Submit</button>

<div id="ticket_no"></div>

<hr>

<h3>Tickets</h3>
<div id="ticket_list"></div>

<button onclick="logout()" style="background:#ff4d4d;margin-top:10px;">Logout</button>

</div>

<div class="footer">© 2026 Bytenex Innovation</div>

</body>
</html>
