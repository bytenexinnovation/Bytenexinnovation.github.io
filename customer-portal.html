<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Bytenex Customer Portal</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>
body{
  margin:0;
  font-family:'Segoe UI',sans-serif;
  background:#f4f8fb;
  position:relative;
}

body::before{
  content:"\f085 \f1eb \f0ad \f233 \f108 \f7c0 \f0e8";
  font-family:"Font Awesome 6 Free";
  font-weight:900;
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  font-size:140px;
  color:rgba(0,0,0,0.03);
  display:flex;
  flex-wrap:wrap;
  justify-content:space-around;
  align-items:center;
  pointer-events:none;
}

.header{
  text-align:center;
  padding:20px;
  font-size:26px;
  font-weight:bold;
  color:#0d6efd;
}

.slogan{
  text-align:center;
  color:#555;
  font-size:14px;
  margin-top:-10px;
}

.container{
  width:400px;
  max-width:90%;
  margin:30px auto;
  background:white;
  padding:25px;
  border-radius:15px;
  box-shadow:0 5px 20px rgba(0,0,0,0.1);
}

input,select,textarea{
  width:100%;
  padding:12px;
  margin:10px 0;
  border-radius:8px;
  border:1px solid #ccc;
  box-sizing:border-box;
}

button{
  width:100%;
  padding:12px;
  background:#0d6efd;
  color:white;
  border:none;
  border-radius:8px;
  cursor:pointer;
}

.dashboard{
  display:none;
  padding:20px;
}

.card{
  background:white;
  padding:12px;
  border-radius:10px;
  margin-bottom:10px;
  box-shadow:0 3px 10px rgba(0,0,0,0.08);
}

.ticket{
  background:white;
  padding:12px;
  margin:10px 0;
  border-radius:10px;
  box-shadow:0 3px 10px rgba(0,0,0,0.08);
}

.topbar{
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.logout{
  background:#dc3545;
  border:none;
  padding:6px 12px;
  color:white;
  border-radius:6px;
}

footer{
  text-align:center;
  color:#555;
  margin-top:20px;
}
</style>
</head>

<body>

<div class="header">Bytenex Customer Portal</div>
<div class="slogan">Empowering Smart Infrastructure & Seamless Support</div>

<!-- LOGIN -->
<div class="container" id="loginPage">
<h3>Login</h3>

<input id="loginId" placeholder="User ID / Email">
<input id="loginPass" type="password" placeholder="Password">

<button onclick="login()">Login</button>

<div onclick="showCreate()" style="text-align:center;color:#0d6efd;cursor:pointer;">Create Account</div>
<div onclick="showForgot()" style="text-align:center;color:#0d6efd;cursor:pointer;">Forgot Password</div>
</div>

<!-- CREATE -->
<div class="container" id="createPage" style="display:none">
<h3>Create Account</h3>

<input id="name" placeholder="Name">
<input id="phone" placeholder="Phone">
<input id="org" placeholder="Organisation">
<input id="location" placeholder="Location">
<input id="email" placeholder="Email">
<input id="pass" type="password" placeholder="Password">
<input id="cpass" type="password" placeholder="Confirm Password">

<button onclick="createAccount()">Create Account</button>
</div>

<!-- FORGOT -->
<div class="container" id="forgotPage" style="display:none">
<h3>Reset Password</h3>

<input id="femail" placeholder="Email">
<input id="forg" placeholder="Organisation">

<button onclick="resetPass()">Reset Password</button>
</div>

<!-- DASHBOARD -->
<div class="dashboard" id="dashboard">

<div class="topbar">
<h2>Dashboard</h2>
<button class="logout" onclick="logout()">Logout</button>
</div>

<div id="customerDetails"></div>

<h3>Tickets</h3>
<div id="ticketList"></div>

<!-- ONLY CUSTOMER FORM -->
<div id="ticketForm">
<h3>New Service Request</h3>

<input id="reqName" placeholder="Requester Name">
<input id="pono" placeholder="PO No">
<input id="issueLoc" placeholder="Location">
<textarea id="desc" placeholder="Minimum 2 lines description"></textarea>

<button onclick="submitTicket()">Submit</button>
</div>

</div>

<footer>© Bytenex Innovation</footer>

<script>

let currentUser=null;
let role="customer";

/* LOGIN */
function login(){

let id=document.getElementById("loginId").value;
let pass=document.getElementById("loginPass").value;

let users=JSON.parse(localStorage.getItem("users")||"[]");

localStorage.removeItem("currentUserData");

if(id==="info@bytenexinnovation.in" && pass==="Asktoyash@1997"){
  role="admin"; currentUser="admin";
}
else if(id==="engineers@bytenexinnovation.in" && pass==="ByteAdmin@123"){
  role="engineer"; currentUser="engineer";
}
else{
  let u=users.find(x=>x.userid===id && x.pass===pass);
  if(!u){alert("Invalid login");return;}
  currentUser=u.userid;
  role="customer";
  localStorage.setItem("currentUserData",JSON.stringify(u));
}

loginPage.style.display="none";
dashboard.style.display="block";

/* ROLE FIX */
document.getElementById("ticketForm").style.display = (role==="customer") ? "block" : "none";

loadCustomerDetails();
loadTickets();
}

/* CREATE ACCOUNT FIXED */
function createAccount(){

let n=document.getElementById("name").value.trim();
let p=document.getElementById("phone").value.trim();
let o=document.getElementById("org").value.trim();
let l=document.getElementById("location").value.trim();
let e=document.getElementById("email").value.trim();
let pw=document.getElementById("pass").value;
let cp=document.getElementById("cpass").value;

if(!n||!p||!o||!l||!e||!pw||!cp){
  alert("All fields required");
  return;
}

if(pw!==cp){
  alert("Password mismatch");
  return;
}

let uid="BYTIN01A-"+Math.floor(Math.random()*9999)+"Z"+Math.floor(Math.random()*99999);

let users=JSON.parse(localStorage.getItem("users")||"[]");

users.push({name:n,phone:p,org:o,location:l,email:e,pass:pw,userid:uid});

localStorage.setItem("users",JSON.stringify(users));

alert("Account Created!\nUser ID: "+uid);

createPage.style.display="none";
loginPage.style.display="block";
}

/* CUSTOMER DETAILS */
function loadCustomerDetails(){
let u=JSON.parse(localStorage.getItem("currentUserData"));
if(!u) return;

customerDetails.innerHTML=`
<div class="card">
<b>Welcome, ${u.name}</b><br>
${u.org}<br>
${u.location}
</div>`;
}

/* SUBMIT TICKET */
function submitTicket(){

let d=document.getElementById("desc").value.trim();

if(d.split(/\n+/).length<2){
alert("Minimum 2 lines required");
return;
}

let po=document.getElementById("pono").value;
let req=document.getElementById("reqName").value;
let loc=document.getElementById("issueLoc").value;

let tickets=JSON.parse(localStorage.getItem("tickets")||"[]");

let ticketNo="BYT/"+po+"/"+Math.floor(Math.random()*900000000);

tickets.push({
user:currentUser,
ticket:ticketNo,
name:req,
pono:po,
location:loc,
status:"Open",
desc:d
});

localStorage.setItem("tickets",JSON.stringify(tickets));

alert("Ticket Created: "+ticketNo);

loadTickets();
}

/* LOAD TICKETS */
function loadTickets(){

let tickets=JSON.parse(localStorage.getItem("tickets")||"[]");
ticketList.innerHTML="";

tickets.forEach((t,i)=>{

if(role==="customer" && t.user===currentUser){
ticketList.innerHTML+=`
<div class="ticket">
<b>${t.ticket}</b><br>
${t.name}<br>
${t.pono}<br>
${t.status}<br>
${t.desc}
</div>`;
}

if(role==="admin" || role==="engineer"){

let btn="";
if(role==="admin" && t.status==="Open"){
btn=`<button onclick="closeTicket(${i})" style="margin-top:8px;background:red;">Close Ticket</button>`;
}

ticketList.innerHTML+=`
<div class="ticket">
<b>${t.ticket}</b><br>
${t.name}<br>
${t.pono}<br>
${t.status}<br>
${t.desc}
${btn}
</div>`;
}

});
}

/* CLOSE */
function closeTicket(i){

let r=prompt("Closing Remarks");
let rca=prompt("RCA");

if(!r||!rca){alert("Required");return;}

let tickets=JSON.parse(localStorage.getItem("tickets"));

tickets[i].status="Closed";
tickets[i].remarks=r;
tickets[i].rca=rca;

localStorage.setItem("tickets",JSON.stringify(tickets));

loadTickets();
}

/* NAV */
function showCreate(){loginPage.style.display="none";createPage.style.display="block";}
function showForgot(){loginPage.style.display="none";forgotPage.style.display="block";}
function logout(){location.reload();}

</script>

</body>
</html>
